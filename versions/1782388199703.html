<html lang="nl">
<head>

<style>
:root {
  --bg: #F3F5F7;
  --header-bg: #0D1F2E;
  --accent: #AE986F;
  --accent-dark: #9a8560;
  --green: #436436;
  --green-light: #e8f2e6;
  --blue-light: #B4D2E7;
  --blue-light-bg: #eaf4fb;
  --text: #0D1F2E;
  --text-muted: #6b7280;
  --text-light: #9ca3af;
  --white: #ffffff;
  --card-border: #e5e7eb;
  --radius-pill: 9999px;
  --radius-card: 10px;
  --radius-sm: 5px;
  color-scheme: light;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  font-weight: 300;
}

/* ===== HEADER ===== */
.header {
  background: var(--header-bg);
  padding: 12px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 3px solid var(--accent);
}
.header-left { display: flex; align-items: center; gap: 14px; }

/* Lancyr inline SVG logo area */
.lancyr-logo {
  display: flex;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
}

.header-title-block { display: flex; flex-direction: column; }
.header-title-block h1 {
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.3px;
}
.header-subtitle {
  font-size: 11px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.header-right { display: flex; align-items: center; gap: 6px; }

/* Pill buttons */
.btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-pill);
  padding: 5px 16px;
  font-size: 11px;
  cursor: pointer;
  color: rgba(255,255,255,0.8);
  font-weight: 400;
  transition: background .15s, color .15s;
  font-family: Poppins, sans-serif;
  letter-spacing: 0.2px;
}
.btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
.btn.active {
  background: var(--accent);
  color: var(--header-bg);
  border-color: var(--accent);
  font-weight: 600;
}
.btn-refresh {
  background: var(--accent);
  color: var(--header-bg);
  margin-left: 4px;
  border: 1px solid var(--accent);
  border-radius: var(--radius-pill);
  font-weight: 700;
  padding: 5px 14px;
}
.btn-refresh:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
.btn-toevoegen {
  background: var(--accent);
  color: var(--header-bg);
  font-size: 12px;
  font-weight: 600;
  padding: 7px 18px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--accent);
  cursor: pointer;
  font-family: Poppins, sans-serif;
}
.btn-toevoegen:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
.btn-opslaan {
  background: var(--header-bg);
  color: #fff;
  padding: 7px 20px;
  border-radius: var(--radius-pill);
  border: none;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: Poppins, sans-serif;
}
.btn-opslaan:hover { opacity: .85; }
.btn-annuleren {
  background: var(--bg);
  color: var(--text-muted);
  padding: 7px 16px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--card-border);
  font-size: 12px;
  cursor: pointer;
  font-family: Poppins, sans-serif;
}
.btn-annuleren:hover { background: #e5e7eb; }
.btn-delete {
  background: transparent;
  border: none;
  color: #d1d5db;
  cursor: pointer;
  font-size: 12px;
  padding: 2px 6px;
  flex-shrink: 0;
  line-height: 1;
  border-radius: var(--radius-sm);
}
.btn-delete:hover { color: #ef4444; background: #fee2e2; }

/* ===== OKR STRIP (always visible below header) ===== */
.okr-strip {
  background: var(--white);
  border-bottom: 3px solid var(--accent);
  padding: 10px 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  position: sticky;
  top: 57px;
  z-index: 9;
}
.okr-strip-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-right: 4px;
}
.okr-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 16px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid transparent;
  cursor: default;
}
.okr-pill.green { background: var(--green-light); color: var(--green); border-color: var(--green); }
.okr-pill.orange { background: #fff7ed; color: #c2410c; border-color: #fb923c; }
.okr-pill.red { background: #fef2f2; color: #b91c1c; border-color: #f87171; }
.okr-pill.neutral { background: var(--bg); color: var(--text-muted); border-color: var(--card-border); }
.okr-pill.blue { background: var(--blue-light-bg); color: #1e6091; border-color: var(--blue-light); }

/* ===== LAYOUT ===== */
.container { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

/* ===== DRUKTE BANNER ===== */
.drukte-banner {
  border-radius: var(--radius-card);
  padding: 14px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  border: 1.5px solid transparent;
}
.drukte-banner.druk { background: #fef2f2; border-color: #fca5a5; }
.drukte-banner.matig { background: #fff7ed; border-color: #fdba74; }
.drukte-banner.rustig { background: var(--green-light); border-color: #86efac; }
.drukte-icon { font-size: 24px; }
.drukte-label { font-size: 15px; font-weight: 700; }
.drukte-sub { font-size: 12px; opacity: .75; margin-top: 1px; font-weight: 300; }
.drukte-banner.druk .drukte-label { color: #b91c1c; }
.drukte-banner.matig .drukte-label { color: #c2410c; }
.drukte-banner.rustig .drukte-label { color: var(--green); }

/* ===== KPI STAT CARDS ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--white);
  border: 1.5px solid var(--card-border);
  border-top: 3px solid var(--card-border);
  border-radius: var(--radius-card);
  padding: 16px 12px;
  text-align: center;
  cursor: pointer;
  transition: border-color .15s;
}
.stat-card:hover { border-top-color: var(--accent); border-color: var(--accent); }
.stat-card.filter-active { border-top-color: var(--accent) !important; border-color: var(--accent); }
.stat-card .number { font-size: 36px; font-weight: 700; line-height: 1.1; color: var(--text); }
.stat-card .label { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 400; }
.stat-card.opgelost .number { color: var(--green); }
.stat-card.opgelost { border-top-color: var(--green); }
.stat-card.brandmeester .number { color: #1d4ed8; }
.stat-card.brandmeester { border-top-color: #93c5fd; }
.stat-card.afkoop .number { color: #7c3aed; }
.stat-card.afkoop { border-top-color: #c4b5fd; }
.stat-card.terugbel .number { color: #c2410c; }
.stat-card.terugbel { border-top-color: #fdba74; }
.stat-card.geen-dekking .number { color: var(--text-muted); }
.stat-card.geen-dekking { border-top-color: #d1d5db; }
.stat-card.stam .number { color: #92400e; }
.stat-card.stam { border-top-color: #fcd34d; }

/* ===== CHART ROW ===== */
.chart-row {
  background: var(--white);
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-card);
  padding: 18px 22px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 28px;
}
.chart-wrap { width: 140px; height: 140px; flex-shrink: 0; }
.chart-legend { flex: 1; display: flex; flex-direction: column; gap: 9px; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend-name { font-size: 12px; flex: 1; font-weight: 300; }
.legend-bar-wrap { width: 90px; background: var(--bg); border-radius: var(--radius-sm); height: 5px; }
.legend-bar { height: 5px; border-radius: var(--radius-sm); transition: width .4s ease; }
.legend-count { font-size: 12px; font-weight: 600; min-width: 20px; text-align: right; color: var(--text); }
.chart-title { font-size: 12px; font-weight: 600; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }

/* ===== WEEK TABLE ===== */
.week-table {
  background: var(--white);
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-card);
  margin-bottom: 16px;
  overflow: hidden;
}
.week-table-header {
  display: grid;
  grid-template-columns: 120px repeat(5, 1fr) 60px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--bg);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  background: var(--bg);
}
.week-row {
  display: grid;
  grid-template-columns: 120px repeat(5, 1fr) 60px;
  padding: 11px 18px;
  border-bottom: 1px solid var(--bg);
  align-items: center;
  font-size: 13px;
  cursor: pointer;
  transition: background .1s;
}
.week-row:last-child { border-bottom: none; }
.week-row:hover { background: #f9fafb; }
.week-row.today { background: #eaf4fb; }
.week-day { font-weight: 600; font-size: 13px; }
.week-day .date-sub { font-size: 11px; color: var(--text-muted); font-weight: 300; }
.week-num { text-align: center; font-weight: 600; font-size: 13px; }
.week-num.green { color: var(--green); }
.week-num.blue { color: #1d4ed8; }
.week-num.purple { color: #7c3aed; }
.week-num.orange { color: #c2410c; }
.week-num.gray { color: var(--text-light); }
.week-score { text-align: right; font-weight: 700; font-size: 12px; }
.week-score.high { color: var(--green); }
.week-score.mid { color: #c2410c; }
.week-score.low { color: #b91c1c; }
.week-empty { color: var(--text-light); font-size: 12px; font-style: italic; font-weight: 300; }
.week-totals {
  display: grid;
  grid-template-columns: 120px repeat(5, 1fr) 60px;
  padding: 11px 18px;
  border-top: 2px solid var(--card-border);
  background: var(--bg);
  font-size: 12px;
  font-weight: 700;
}

/* ===== SECTION CARDS ===== */
.section {
  background: var(--white);
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-card);
  margin-bottom: 14px;
  overflow: hidden;
}
.section-header {
  padding: 13px 20px;
  border-bottom: 1px solid var(--bg);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  border-left: 4px solid var(--accent);
}
.section-header:hover { background: #f9fafb; }
.section-icon {
  width: 24px;
  height: 24px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}
.section-title {
  font-size: 11px;
  font-weight: 700;
  flex: 1;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--text);
}
.section-count {
  background: var(--bg);
  border-radius: var(--radius-pill);
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  border: 1px solid var(--card-border);
}
.chevron { font-size: 10px; color: var(--text-light); transition: transform .2s; }
.collapsed .chevron { transform: rotate(-90deg); }

/* ===== DAG HEADER ===== */
.dag-header {
  padding: 10px 20px;
  background: var(--bg);
  border-bottom: 1px solid var(--card-border);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.dag-header .dag-score { font-weight: 700; color: var(--text); }

/* ===== CONVERSATION ITEMS ===== */
.conv-item {
  padding: 16px 20px;
  border-bottom: 1px solid #f3f4f6;
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 14px;
}
.conv-item:last-child { border-bottom: none; }
.conv-time { font-size: 12px; color: var(--text); padding-top: 1px; font-variant-numeric: tabular-nums; font-weight: 600; }
.conv-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; color: var(--text); }
.conv-persons { font-size: 12px; color: var(--text-muted); margin-bottom: 7px; font-weight: 300; }
.conv-summary { font-size: 13px; color: #374151; line-height: 1.6; margin-bottom: 10px; font-weight: 300; }
.conv-footer { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }

/* ===== TAGS ===== */
.tag {
  display: inline-block;
  padding: 2px 9px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 500;
}
.tag-consument { background: #fce7f3; color: #9d174d; }
.tag-bestuursrecht { background: #ede9fe; color: #5b21b6; }
.tag-overig { background: var(--bg); color: var(--text-muted); }
.tag-arbeidsrecht { background: var(--blue-light-bg); color: #1e6091; }
.tag-huur { background: #ecfdf5; color: #065f46; }
.tag-bouw { background: #fff7ed; color: #92400e; }
.tag-contract { background: var(--green-light); color: var(--green); }
.tag-avg { background: #f3e8ff; color: #6b21a8; }
.tag-schadenr { background: var(--green-light); color: #14532d; font-family: monospace; font-size: 11px; }

/* ===== OUTCOME BADGES ===== */
.outcome-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 11px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 600;
  margin-left: auto;
}
.outcome-opgelost { background: var(--green-light); color: var(--green); }
.outcome-brandmeester { background: var(--blue-light-bg); color: #1e6091; }
.outcome-afkoop { background: #f3e8ff; color: #6b21a8; }
.outcome-terugbel { background: #fff7ed; color: #c2410c; }
.outcome-geen-dekking { background: var(--bg); color: var(--text-muted); }
.outcome-stam { background: #fef9c3; color: #92400e; }
.outcome-verkeerd { background: var(--bg); color: var(--text-muted); }
.outcome-badge { cursor: pointer; user-select: none; }
.conv-det {
  display: none;
  margin-top: 8px;
  padding: 10px 14px;
  background: var(--bg);
  border-left: 4px solid var(--accent);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 12px;
  color: #374151;
  line-height: 1.65;
  font-weight: 300;
}

/* ===== ACTION ITEMS ===== */
.action-item {
  padding: 13px 20px;
  border-bottom: 1px solid #f3f4f6;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.action-item:last-child { border-bottom: none; }
.action-item:has(.prio-hoog) { background: #fff8f8; border-left: 3px solid #ef4444; padding-left: 17px; }
.prio-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.prio-hoog { background: #ef4444; }
.prio-middel { background: #f97316; }
.prio-laag { background: #d1d5db; }
.check-box {
  width: 16px;
  height: 16px;
  border: 2px solid var(--card-border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 1px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
}
.check-box:hover { border-color: var(--accent); }
.check-box.done { background: var(--green); border-color: var(--green); color: #fff; }
.action-text { font-size: 13px; flex: 1; font-weight: 400; }
.action-text.done-text { text-decoration: line-through; color: var(--text-light); }
.action-meta { display: flex; gap: 10px; margin-top: 3px; }
.action-owner { font-size: 11px; color: var(--text-muted); font-weight: 300; }
.dl-urgent { font-size: 11px; font-weight: 600; color: #b91c1c; }
.dl-soon { font-size: 11px; font-weight: 600; color: #c2410c; }
.dl-ok { font-size: 11px; font-weight: 600; color: var(--green); }

/* ===== ANALYSE ===== */
.analyse-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 18px 20px;
}
.analyse-col-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.analyse-col-title.goed { color: var(--green); }
.analyse-col-title.beter { color: #b91c1c; }
.analyse-point {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 13px;
  line-height: 1.55;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
}
.analyse-point.goed-point { background: var(--green-light); border-left: 3px solid var(--green); }
.analyse-point.beter-point { background: #fff7ed; border-left: 3px solid #f97316; }
.analyse-icon { flex-shrink: 0; margin-top: 1px; font-size: 12px; }
.analyse-text { color: #374151; font-weight: 300; }
.analyse-divider { height: 1px; background: var(--bg); margin: 0 20px 16px; }
.analyse-score {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--card-border);
}
.score-label { font-size: 12px; color: var(--text-muted); font-weight: 500; white-space: nowrap; }
.score-bar-wrap { flex: 1; height: 6px; background: #e5e7eb; border-radius: var(--radius-pill); overflow: hidden; }
.score-bar { height: 6px; border-radius: var(--radius-pill); background: linear-gradient(90deg, var(--green), #5a9a48); }
.score-num { font-size: 14px; font-weight: 700; color: var(--green); min-width: 50px; text-align: right; }

/* ===== MANUAL ENTRY FORM ===== */
.manual-entry {
  padding: 14px 20px;
  border-bottom: 1px solid #f3f4f6;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.manual-entry:last-of-type { border-bottom: none; }
.manual-form {
  background: var(--bg);
  border-top: 1px solid var(--card-border);
  padding: 18px 20px;
}
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .6px; }
.form-input, .form-select, .form-textarea {
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 13px;
  background: var(--white);
  font-family: inherit;
  color: var(--text);
  font-weight: 300;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.form-textarea { min-height: 64px; resize: vertical; }
.form-actions { display: flex; gap: 8px; margin-top: 6px; }
.manual-add-row { padding: 12px 20px; border-top: 1px solid #f3f4f6; }

/* ===== OKR WEEK BANNER (in-page) ===== */
.okr-week-banner {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.okr-week-card {
  background: var(--white);
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-card);
  padding: 14px 18px;
  flex: 1;
  min-width: 160px;
  cursor: pointer;
}

let _ghSaving = false;
let _ghDirty = false;

async function _ghLoad() {
  try {
    const [raw, meta] = await Promise.all([
      fetch(_GH_RAW + '?t=' + Date.now()).then(r => r.ok ? r.json() : {}),
      fetch(_GH_API, { headers: { Authorization: 'Bearer ' + _GH_TOKEN, Accept: 'application/vnd.github+json' } }).then(r => r.json())
    ]);
    _ghData = (raw && typeof raw === 'object' && !Array.isArray(raw)) ? raw : {};
    _ghSha = meta.sha || null;
  } catch(e) { console.warn('GitHub load fout:', e); _ghData = {}; }
  _ghLoaded = true;
  if (typeof setView === 'function') setView(currentView);
}

async function _ghFlush() {
  if (_ghSaving) { _ghDirty = true; return; }
  _ghSaving = true; _ghDirty = false;
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(_ghData))));
    const r = await fetch(_GH_API, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + _GH_TOKEN, 'Content-Type': 'application/json', Accept: 'application/vnd.github+json' },
      body: JSON.stringify({ message: 'update manual entries', content, sha: _ghSha })
    });
    const j = await r.json();
    if (j.content?.sha) _ghSha = j.content.sha;
  } catch(e) { console.warn('GitHub sync fout:', e); }
  _ghSaving = false;
  if (_ghDirty) _ghFlush();
}

function getManualEntries(key) { return (_ghLoaded ? _ghData[key] : null) || []; }
function saveManualEntries(key, entries) { _ghData[key] = entries; _ghFlush(); }
function deleteManualEntry(key, id) { saveManualEntries(key, getManualEntries(key).filter(e => e.id !== id)); setView(currentView); }
function getManualStats(key) {
  const entries = getManualEntries(key);
  const s = { opgelost:0, brandmeester:0, afkoop:0, terugbel:0, geenDekking:0, stam:0 };
  let count = 0;
  entries.forEach(e => {
    if (e.gelinktMetGesprek) return;
    count++;
    if (e.uitkomst === 'outcome-opgelost' || e.uitkomst === 'outcome-verkeerd') s.opgelost++;
    else if (e.uitkomst === 'outcome-brandmeester') s.brandmeester++;
    else if (e.uitkomst === 'outcome-afkoop') s.afkoop++;
    else if (e.uitkomst === 'outcome-terugbel') s.terugbel++;
    else if (e.uitkomst === 'outcome-geen-dekking') s.geenDekking++;
    else if (e.uitkomst === 'outcome-stam') s.stam++;
  });
  return { count, stats: s };
}
function mergeStats(granolaStats, manualStats) {
  return {
    opgelost:     (granolaStats?.opgelost     || 0) + manualStats.opgelost,
    brandmeester: (granolaStats?.brandmeester || 0) + manualStats.brandmeester,
    afkoop:       (granolaStats?.afkoop       || 0) + manualStats.afkoop,
    terugbel:     (granolaStats?.terugbel     || 0) + manualStats.terugbel,
    geenDekking:  (granolaStats?.geenDekking  || 0) + manualStats.geenDekking,
    stam:         (granolaStats?.stam         || 0) + manualStats.stam
  };
}
function toggleManualForm(key) {
  const f = document.getElementById('manual-form-' + key);
  if (f) f.classList.toggle('hidden');
}
function onManualOutcomeChange(key) {
  const v = document.getElementById('manual-uitkomst-' + key)?.value || '';
  const row = document.getElementById('manual-schadenr-row-' + key);
  if (row) row.style.display = (v === 'outcome-afkoop' || v === 'outcome-brandmeester' || v === 'outcome-stam') ? '' : 'none';
}
let _pendingMerge = null;
function _normName(s) { return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'').trim(); }
function _findMatchingConv(key, naam) {
  const convs = weekData[key]?.conversations || [];
  const needle = _normName(naam);
  if (!needle) return null;
  return convs.find(c => {
    const hay = _normName(c.personen + ' ' + c.titel);
    return needle.split(' ').filter(w=>w.length>2).every(w => hay.includes(w));
  }) || null;
}
function saveManualEntry(key) {
  const g = id => document.getElementById(id)?.value?.trim() || '';
  const uitkomst = g('manual-uitkomst-' + key);
  if (!uitkomst) { alert('Selecteer eerst een uitkomst.'); return; }
  const label = MANUAL_OUTCOMES.find(([v]) => v === uitkomst)?.[1] || uitkomst;
  const naam = g('manual-naam-' + key);
  const entry = {
    id: Date.now().toString(),
    ticketnummer:  g('manual-ticket-' + key),
    type:          g('manual-type-' + key),
    uitkomst, uitkomstLabel: label,
    naamVerzekerde: naam,
    telefoon:      g('manual-tel-' + key),
    email:         g('manual-email-' + key),
    schadenummer:  g('manual-schadenr-' + key),
    opmerkingen:   g('manual-opmerking-' + key)
  };
  if (naam) {
    const match = _findMatchingConv(key, naam);
    if (match) {
      _pendingMerge = { key, entry, match };
      const body = document.getElementById('mergeModalBody');
      body.innerHTML = `Is <span class="merge-modal-name">${naam}</span> dezelfde persoon als in het gesprek hieronder?`
        + `<div class="merge-modal-conv"><strong>${match.tijd} — ${match.titel}</strong><br>${match.personen}<br><em>${match.samenvatting}</em></div>`
        + `Kies <b>Ja</b> om samen te voegen (telt niet dubbel mee in statistieken), of <b>Nee</b> om apart toe te voegen.`;
      document.getElementById('mergeModal').classList.remove('hidden');
      return;
    }
  }
  _doSaveEntry(key, entry);
}
function confirmMerge() {
  if (!_pendingMerge) return;
  const { key, entry, match } = _pendingMerge;
  entry.gelinktMetGesprek = { tijd: match.tijd, titel: match.titel };
  _doSaveEntry(key, entry);
  closeMergeModal();
}
function confirmSeparate() {
  if (!_pendingMerge) return;
  const { key, entry } = _pendingMerge;
  _doSaveEntry(key, entry);
  closeMergeModal();
}
function closeMergeModal() { document.getElementById('mergeModal').classList.add('hidden'); _pendingMerge = null; }
function _doSaveEntry(key, entry) {
  const entries = getManualEntries(key);
  entries.push(entry);
  saveManualEntries(key, entries);
  setView(currentView);
}

const DAYS_NL = ["zondag","maandag","dinsdag","woensdag","donderdag","vrijdag","zaterdag"];
const MONTHS_NL = ["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"];
const COLORS = { opgelost:"#436436", brandmeester:"#1d4ed8", stam:"#92400e", afkoop:"#7c3aed", terugbel:"#c2410c", geenDekking:"#9ca3af" };

function dateKey(d) { return d.toISOString().slice(0,10); }
function formatDate(key) {
  const d = new Date(key + "T12:00:00");
  return `${DAYS_NL[d.getDay()]} ${d.getDate()} ${MONTHS_NL[d.getMonth()]}`;
}
function getWeekKeys() {
  const today = new Date(); today.setHours(12,0,0,0);
  const dow = today.getDay();
  const monday = new Date(today); monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  const keys = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    if (d <= today) keys.push(dateKey(d));
  }
  return keys;
}
function getLastWeekKeys() {
  const today = new Date(); today.setHours(12,0,0,0);
  const dow = today.getDay();
  const thisMonday = new Date(today); thisMonday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  const lastMonday = new Date(thisMonday); lastMonday.setDate(thisMonday.getDate() - 7);
  const keys = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(lastMonday); d.setDate(lastMonday.getDate() + i);
    keys.push(dateKey(d));
  }
  return keys;
}

function drukteBadge(granolaGesprekken, totalGesprekken) {
  if (totalGesprekken === 0 && granolaGesprekken === 0) return { cls:"rustig", icon:"😴", label:"Geen gesprekken", sub:"Geen Granola-gesprekken gevonden voor vandaag." };
  const drukte = totalGesprekken >= 6 ? "druk" : totalGesprekken >= 4 ? "matig" : "rustig";
  const icon = drukte === "druk" ? "🔥" : drukte === "matig" ? "🟡" : "🟢";
  const label = drukte === "druk" ? "Drukke dag" : drukte === "matig" ? "Gemiddelde dag" : "Rustige dag";
  const sub = `${totalGesprekken} gesprekken${totalGesprekken !== granolaGesprekken ? ` (${granolaGesprekken} Granola + ${totalGesprekken - granolaGesprekken} handmatig)` : ""}`;
  return { cls: drukte, icon, label, sub };
}

function _normPersonName(personen) {
  const m = (personen||'').match(/Verzekerde:\s*([^\xb7\n]+)/);
  if (!m) return null;
  const name = m[1].trim().toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
  if (!name || name.length < 4) return null;
  const skip = ['anoniem','onbekend','mevrouw','meneer','dhr','mevr','partner','echtgenoot'];
  if (skip.some(s => name === s || name.startsWith(s + ' '))) return null;
  const tussenvoegsels = new Set(['van','de','den','der','van de','van den','van der','van het','van t','ter','te','ten','het','t','in de','in het','op de']);
  let words = name.split(' ').filter(Boolean);
  const rootWords = words.filter(w => !tussenvoegsels.has(w));
  if (rootWords.length >= 2) return rootWords[0] + ' ' + rootWords[rootWords.length-1];
  if (rootWords.length === 1) return rootWords[0];
  return words.length >= 2 ? words[0] + ' ' + words[words.length-1] : name;
}
function _groupConvsByPerson(convs) {
  const seen = {}, result = [];
  (convs||[]).forEach(c => {
    const key = _normPersonName(c.personen);
    if (key && seen[key] !== undefined) { result[seen[key]].push(c); }
    else { const idx = result.length; result.push([c]); if (key) seen[key] = idx; }
  });
  return result;
}
function _statsFromGroups(groups) {
  const s = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0,stam:0};
  groups.forEach(group => {
    const uit = Array.isArray(group[0].uitkomst) ? group[0].uitkomst[0] : group[0].uitkomst;
    const isVso = group.some(g => /vso|vaststellingsovereenkomst/i.test((g.titel||'')+(g.samenvatting||'')));
    if (uit === 'outcome-opgelost' || uit === 'outcome-verkeerd') { s.opgelost++; if (isVso) s.stam++; }
    else if (uit === 'outcome-brandmeester') s.brandmeester++;
    else if (uit === 'outcome-afkoop') s.afkoop++;
    else if (uit === 'outcome-terugbel') s.terugbel++;
    else if (uit === 'outcome-geen-dekking') s.geenDekking++;
    else if (uit === 'outcome-stam') { s.stam++; s.opgelost++; }
  });
  return s;
}
function toggleDet(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ===================== OKR STRIP UPDATER =====================
function updateOKRStrip(dayData, weekTotals, drukte) {
  const bmEl = document.getElementById('okr-brandmeester');
  const scoreEl = document.getElementById('okr-score');
  const drukteEl = document.getElementById('okr-drukte');

  if (weekTotals !== null) {
    const bm = weekTotals.brandmeester || 0;
    const bmMax = 6;
    const bmCls = bm < bmMax ? 'green' : bm === bmMax ? 'orange' : 'red';
    if (bmEl) { bmEl.className = 'okr-pill ' + bmCls; bmEl.textContent = `🎯 Brandmeester: ${bm}/${bmMax}`; }
  }

  if (dayData) {
    const score = dayData.score || 0;
    const scoreCls = score >= 8 ? 'green' : score >= 6.5 ? 'orange' : score > 0 ? 'red' : 'neutral';
    if (scoreEl) { scoreEl.className = 'okr-pill ' + scoreCls; scoreEl.textContent = `⭐ Score: ${score > 0 ? score.toFixed(1)+'/10' : '—'}`; }
  }

  if (drukte) {
    const drukCls = drukte === 'druk' ? 'red' : drukte === 'matig' ? 'orange' : 'green';
    const drukLabel = drukte === 'druk' ? 'Druk' : drukte === 'matig' ? 'Matig' : 'Rustig';
    if (drukteEl) { drukteEl.className = 'okr-pill ' + drukCls; drukteEl.textContent = `📊 Drukte: ${drukLabel}`; }
  }
}

function buildConversations(convs, showDagHeader, dagLabel, dagScore) {
  if (!convs || convs.length === 0) return `<div style="padding:16px 20px;color:#9ca3af;font-size:13px;font-weight:300">Geen gesprekken geregistreerd.</div>`;
  let html = "";
  if (showDagHeader) html += `<div class="dag-header"><span>${dagLabel}</span>${dagScore != null ? `<span class="dag-score">⭐ ${dagScore.toFixed(1)}/10</span>` : ""}</div>`;
  const groups = _groupConvsByPerson(convs);
  html += groups.map(group => {
    const isVso = g => /vso|vaststellingsovereenkomst/i.test((g.titel||'') + ' ' + (g.samenvatting||''));
    const _vsoAlreadyHandled = g => { const s = (g.samenvatting||'').toLowerCase(); return s.includes('stam advocaten') || s.includes('extern advocaat') || s.includes('extern arbeidsrecht') || s.includes('advocatenkantoor') || (Array.isArray(g.uitkomst) ? g.uitkomst[0] : g.uitkomst) === 'outcome-stam'; };
    const vsoWarn = g => isVso(g) && !_vsoAlreadyHandled(g)
      ? `<span style="background:#fef9c3;color:#92400e;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600">⚡ VSO → Stam Advocaten aanbieden?</span>` : '';
    if (group.length === 1) {
      const cv = group[0];
      const uit = Array.isArray(cv.uitkomst) ? cv.uitkomst : [cv.uitkomst, cv.uitkomst];
      const detId = 'cd' + Math.random().toString(36).substr(2,7);
      const bullets = (cv.samenvatting||'').split(/(?<=[.;])\s+/).filter(s=>s.trim().length>8).map(s=>`<div>• ${s.trim()}</div>`).join('');
      return `<div class="conv-item">
      <div class="conv-time">${cv.tijd}</div>
      <div>
        <div class="conv-title">${cv.titel}</div>
        <div class="conv-persons">${cv.personen}</div>
        <div class="conv-summary">${cv.samenvatting}</div>
        <div class="conv-footer">
          ${cv.tags.map(([cls,lbl]) => `<span class="tag ${cls}">${lbl}</span>`).join("")}
          <span class="outcome-badge ${uit[0]}" onclick="toggleDet('${detId}')" title="Klik voor redenen">${uit[1]} ▾</span>
          ${vsoWarn(cv)}
        </div>
        <div id="${detId}" class="conv-det">${bullets || cv.samenvatting}</div>
      </div>
    </div>`;
    } else {
      const firstName = (() => { const m = group[0].personen.match(/Verzekerde:\s*([^\xb7]+)/); return m ? m[1].trim() : 'Meerdere gesprekken'; })();
      return `<div class="conv-item" style="border-left:3px solid #1d4ed8;padding-left:10px">
      <div class="conv-time">${group[0].tijd}</div>
      <div style="width:100%">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div class="conv-title">${firstName}</div>
          <span style="background:#1d4ed8;color:#fff;padding:1px 9px;border-radius:9999px;font-size:10px;font-weight:700">${group.length}&times;</span>
        </div>
        ${group.map((cv, i) => {
          const medewerker = cv.personen.split('\xb7')[1]?.trim() || '';
          const uit = Array.isArray(cv.uitkomst) ? cv.uitkomst : [cv.uitkomst, cv.uitkomst];
          return `<div style="border-top:1px solid #f3f4f6;padding:8px 0 4px">
            <div style="font-size:11px;font-weight:600;color:#6b7280;margin-bottom:4px">${i === 0 ? medewerker : 'Vervolg — ' + medewerker} <span style="color:#d1d5db;font-weight:400">${cv.tijd}</span></div>
            <div class="conv-summary">${cv.samenvatting}</div>
            <div class="conv-footer" style="margin-top:4px">
              ${cv.tags.map(([cls,lbl]) => `<span class="tag ${cls}">${lbl}</span>`).join("")}
              <span class="outcome-badge ${uit[0]}">${uit[1]}</span>
              ${vsoWarn(cv)}
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
    }
  }).join("");
  return html;
}

// ===================== JARGON FILTER =====================
const _jargonMap = [
  [/routeringsgesprekken?/gi, 'gesprekken die verkeerd binnenkwamen'],
  [/misdirected calls?/gi, 'verkeerd doorverbonden telefoontjes'],
  [/dekkingsspanning/gi, 'onduidelijkheid over wat de polis dekt'],
  [/procesuitzondering/gi, 'uitzondering op het normale proces'],
  [/polisverificatie/gi, 'controle van de polis'],
  [/franchise[-\s]check/gi, 'controle van het eigen risico'],
  [/doorverwijzingsdrempel/gi, 'grens voor doorverwijzen'],
  [/uitloopperiode/gi, 'periode na beëindigen polis'],
  [/synth?ronisatie[-\s]probleem/gi, 'systeem-synchronisatieprobleem'],
];
function _jargonFilter(text) {
  if (!text) return text;
  let out = text;
  _jargonMap.forEach(([pat, rep]) => { out = out.replace(pat, rep); });
  return out;
}

function buildWeekAnalyse(keys) {
  const allGoed = [], allBeter = [];
  let scoreSum = 0, scoreDays = 0;
  keys.forEach(k => {
    const d = weekData[k]; if (!d || !d.analyse) return;
    const dag = formatDate(k);
    d.analyse.goed.forEach(t => allGoed.push({ dag, t }));
    d.analyse.beter.forEach(t => allBeter.push({ dag, t }));
    if (d.score > 0) { scoreSum += d.score; scoreDays++; }
  });
  const avgScore = scoreDays > 0 ? (scoreSum/scoreDays).toFixed(1) : null;
  if (allGoed.length === 0 && allBeter.length === 0) return '';
  return `<div class="section">
    <div class="section-header" onclick="toggle(this)">
      <div class="section-icon" style="background:#f3e8ff">📊</div>
      <div class="section-title">Kwaliteitsanalyse — hele week${avgScore ? ` · ⭐ ${avgScore}/10` : ''}</div>
      <span class="chevron">▼</span>
    </div>
    <div class="section-body">
      <div class="analyse-grid" style="padding:18px 20px">
        <div>
          <div class="analyse-col-title goed">✅ Wat ging goed</div>
          ${allGoed.map(({dag,t}) => `<div class="analyse-point goed-point"><div class="analyse-icon">✓</div><div class="analyse-text"><span style="font-size:11px;color:#6b7280;font-weight:500">${dag}:</span> ${_jargonFilter(t)}</div></div>`).join('') || '<div style="color:#9ca3af;font-size:13px">Geen data.</div>'}
        </div>
        <div>
          <div class="analyse-col-title beter">⚠️ Wat kon beter</div>
          ${allBeter.map(({dag,t}) => `<div class="analyse-point beter-point"><div class="analyse-icon">!</div><div class="analyse-text"><span style="font-size:11px;color:#6b7280;font-weight:500">${dag}:</span> ${_jargonFilter(t)}</div></div>`).join('') || '<div style="color:#9ca3af;font-size:13px">Geen data.</div>'}
        </div>
      </div>
    </div>
  </div>`;
}

  keys.forEach(k => {
    const d = weekData[k];
    const m = getManualStats(k);
    const merged = mergeStats(d?.stats, m.stats);
    const total = (d?.gesprekken || 0) + m.count;
    if (total > 0 || d?.gesprekken > 0) {
      totals.opgelost += merged.opgelost; totals.brandmeester += merged.brandmeester;
      totals.afkoop += merged.afkoop; totals.terugbel += merged.terugbel; totals.geenDekking += merged.geenDekking;
      totalGesprekken += total;
      if (d?.score > 0) { scoreSum += d.score; scoreDays++; }
    }
  });
  const avgScore = scoreDays > 0 ? scoreSum / scoreDays : null;
  const DAGNAMEN = ["Ma","Di","Wo","Do","Vr","Za","Zo"];

  updateOKRStrip(null, totals, null);

    const d = weekData[k];
    const m = getManualStats(k);

    const scoreClass = d?.score >= 8 ? "high" : d?.score >= 6.5 ? "mid" : "low";

    const d = weekData[k];

  const allManualWeek = keys.filter(k => getManualEntries(k).length > 0).map(k => buildManualSection(k)).join("");
  const allActies = keys.flatMap(k => weekData[k]?.acties || []);
  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="drukte-banner" style="background:var(--blue-light-bg);border-color:var(--blue-light)">
      <div class="drukte-icon">📅</div>
      <div><div class="drukte-label" style="color:#1e6091">Week totaal — ${totalGesprekken} gesprekken</div><div class="drukte-sub">${keys.length} dagen · ${scoreDays} dag(en) met data${avgScore !== null ? ` · gem. score ${avgScore.toFixed(1)}/10` : ""}</div></div>
    </div>
    ${buildOKRWeekBanner(totals)}
    <div class="week-table">
      <div class="week-table-header"><div>Dag</div><div style="text-align:center;color:var(--green)">✅ Opgelost</div><div style="text-align:center;color:#1d4ed8">⚖️ Brandm.</div><div style="text-align:center;color:#7c3aed">🤝 Afkoop</div><div style="text-align:center;color:#c2410c">📞 Terug</div><div style="text-align:center;color:#9ca3af">🚫 Geen</div><div style="text-align:right">Score</div></div>
      ${tableRows}
      <div class="week-totals"><div>Totaal</div><div style="text-align:center;color:var(--green)">${totals.opgelost}</div><div style="text-align:center;color:#1d4ed8">${totals.brandmeester}</div><div style="text-align:center;color:#7c3aed">${totals.afkoop}</div><div style="text-align:center;color:#c2410c">${totals.terugbel}</div><div style="text-align:center;color:#9ca3af">${totals.geenDekking}</div><div style="text-align:right">${avgScore !== null ? avgScore.toFixed(1) : "—"}</div></div>
    </div>
    ${buildStats(totals)}
    ${buildFilterBanner(keys.flatMap(k => weekData[k]?.conversations||[]), keys.flatMap(k => getManualEntries(k)))}
    ${buildChart(totals)}
    <div class="section">
      <div class="section-header" onclick="toggle(this)"><div class="section-icon" style="background:var(--blue-light-bg)">💬</div><div class="section-title">Alle gesprekken deze week</div><span class="section-count">${keys.reduce((a,k)=>(weekData[k]?.gesprekken||0)+a,0)}</span><span class="chevron">▼</span></div>
      <div class="section-body">${allConvs || '<div style="padding:16px 20px;color:#9ca3af;font-size:13px">Nog geen gesprekken deze week.</div>'}</div>
    </div>
    ${allManualWeek}
    ${buildWeekAnalyse(keys)}
    ${buildBrandmeesterRedenen(keys)}
    <div class="section">
      <div class="section-header" onclick="toggle(this)"><div class="section-icon" style="background:var(--green-light)">✅</div><div class="section-title">Openstaande actiepunten</div><span class="section-count">${allActies.length}</span><span class="chevron">▼</span></div>
      <div class="section-body">${buildActies(allActies)}</div>
    </div>`;
  initChart(totals);
}

function renderTeam() {
  document.getElementById("header-date").textContent = "Team — Leidinggevenden";
  const today = new Date();
  const yearStr = today.getFullYear().toString();
  const monthStr = today.toISOString().slice(0,7);
  const weekKeys = getWeekKeys();

  let weekStats = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0,stam:0};
  let weekGesprekken = 0, weekScore = 0, weekScoreDagen = 0;
  let monthStats = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0,stam:0};
  let monthGesprekken = 0;
  let yearStats = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0,stam:0};
  let yearGesprekken = 0, yearAfkoop = 0;

  Object.entries(weekData).forEach(([k, d]) => {
    if (!d || !d.stats) return;
    const s = d.stats; const g = d.gesprekken || 0;
    if (k.startsWith(yearStr)) {
      Object.keys(yearStats).forEach(key => yearStats[key] = (yearStats[key]||0) + (s[key]||0));
      yearGesprekken += g;
      (d.conversations||[]).forEach(cv => {
        const uit = Array.isArray(cv.uitkomst) ? cv.uitkomst[0] : cv.uitkomst;
        if (uit === 'outcome-afkoop') { const mm = (cv.samenvatting||'').match(/€\s*([\d.,]+)/); if (mm) { const amt = parseFloat(mm[1].replace(',','.')); if (!isNaN(amt) && amt < 10000) yearAfkoop += amt; } }
      });
    }
    if (k.startsWith(monthStr)) { Object.keys(monthStats).forEach(key => monthStats[key] = (monthStats[key]||0) + (s[key]||0)); monthGesprekken += g; }
    if (weekKeys.includes(k)) { Object.keys(weekStats).forEach(key => weekStats[key] = (weekStats[key]||0) + (s[key]||0)); weekGesprekken += g; if (d.score > 0) { weekScore += d.score; weekScoreDagen++; } }
  });
  const avgWeekScore = weekScoreDagen > 0 ? (weekScore/weekScoreDagen).toFixed(1) : '—';
  const budgetPct = Math.min(100, Math.round(yearAfkoop/40000*100));
  const budgetColor = budgetPct < 50 ? 'var(--green)' : budgetPct < 80 ? '#c2410c' : '#b91c1c';
  const brandmeesterPct = yearGesprekken > 0 ? Math.round(yearStats.brandmeester/yearGesprekken*100) : 0;
  const opgelostPct = yearGesprekken > 0 ? Math.round(yearStats.opgelost/yearGesprekken*100) : 0;

  updateOKRStrip(null, weekStats, null);

  const okrCards = [
    { doel: '≤ 1 gemiste beller per dag', icon: '📵', status: 'meting loopt (juni)', bg: 'var(--blue-light-bg)', color: '#1e6091' },
    { doel: '0 open tickets einde dag', icon: '📋', status: 'meting loopt', bg: 'var(--green-light)', color: 'var(--green)' },
    { doel: 'Max. 5 dagen wachtstand', icon: '⏳', status: 'meting loopt', bg: '#fff7ed', color: '#c2410c' },
  ].map(o => `<div style="background:${o.bg};border-radius:var(--radius-card);padding:16px 18px;flex:1;min-width:180px;border:1.5px solid var(--card-border)">
    <div style="font-size:20px;margin-bottom:6px">${o.icon}</div>
    <div style="font-weight:700;font-size:13px;color:${o.color};margin-bottom:4px">${o.doel}</div>
    <div style="font-size:11px;color:#6b7280;font-weight:300">${o.status}</div>
  </div>`).join('');

  const app = document.getElementById("app");
  app.innerHTML = `
    <div style="background:#fef9c3;border:1.5px solid #fde68a;border-radius:var(--radius-card);padding:12px 18px;margin-bottom:14px;font-size:12px;color:#92400e;display:flex;gap:10px;align-items:flex-start">
      <span style="font-size:15px;flex-shrink:0">⚠️</span>
      <span><strong>Let op:</strong> tickets worden nog niet opgehaald uit Zoho Desk. Deze informatie is alleen gebaseerd op gesprekken in Granola en handmatig toegevoegde tickets.</span>
    </div>
    <div class="drukte-banner" style="background:#f3e8ff;border-color:#c4b5fd">
      <div class="drukte-icon">👥</div>
      <div><div class="drukte-label" style="color:#6b21a8">Team Dashboard</div><div class="drukte-sub">OKR-voortgang en statistieken voor leidinggevenden</div></div>
    </div>

    <div style="background:var(--white);border:1.5px solid var(--card-border);border-radius:var(--radius-card);padding:18px 20px;margin-bottom:16px;border-left:3px solid var(--accent)">
      <div style="font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px">🎯 OKR-doelstellingen</div>
      <div style="display:flex;flex-wrap:wrap;gap:12px">${okrCards}</div>
    </div>

    <div style="background:var(--white);border:1.5px solid var(--card-border);border-radius:var(--radius-card);padding:18px 20px;margin-bottom:16px;border-left:3px solid var(--accent)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.6px">💸 Afkoopbudget ${yearStr}</span>
        <span style="font-size:14px;font-weight:700;color:${budgetColor}">€${yearAfkoop.toLocaleString('nl-NL',{minimumFractionDigits:0,maximumFractionDigits:0})} / €40.000</span>
      </div>
      <div style="background:var(--bg);border-radius:var(--radius-pill);height:8px;overflow:hidden;margin-bottom:8px">
        <div style="height:8px;border-radius:var(--radius-pill);background:${budgetColor};width:${budgetPct}%;transition:width .4s"></div>
      </div>
      <div style="font-size:11px;color:#6b7280;font-weight:300">${budgetPct}% van het jaarbudget gebruikt · streefdoel: zo min mogelijk afkopen</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
      <div class="stat-card" style="border-top-color:var(--accent)"><div class="number" style="color:var(--text)">${weekGesprekken}</div><div class="label">Gesprekken deze week</div></div>
      <div class="stat-card" style="border-top-color:${parseFloat(avgWeekScore)>=7.5?'var(--green)':parseFloat(avgWeekScore)>=6.5?'#fdba74':'#fca5a5'}"><div class="number" style="color:${parseFloat(avgWeekScore)>=7.5?'var(--green)':parseFloat(avgWeekScore)>=6.5?'#c2410c':'#b91c1c'}">${avgWeekScore}</div><div class="label">Gem. kwaliteitsscore deze week</div></div>
      <div class="stat-card brandmeester"><div class="number">${weekStats.brandmeester}</div><div class="label">Doorverwezen Brandmeester</div></div>
    </div>

    <div style="background:var(--white);border:1.5px solid var(--card-border);border-radius:var(--radius-card);padding:18px 20px;margin-bottom:16px;border-left:3px solid var(--accent)">
      <div style="font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px">📅 Deze maand</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--green)">${monthStats.opgelost}</div><div style="font-size:11px;color:#6b7280;font-weight:300;margin-top:3px">Opgelost</div></div>
        <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#1d4ed8">${monthStats.brandmeester}</div><div style="font-size:11px;color:#6b7280;font-weight:300;margin-top:3px">Brandmeester</div></div>
        <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#7c3aed">${monthStats.afkoop}</div><div style="font-size:11px;color:#6b7280;font-weight:300;margin-top:3px">Afkoop</div></div>
        <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#c2410c">${monthStats.terugbel}</div><div style="font-size:11px;color:#6b7280;font-weight:300;margin-top:3px">Terugbellen</div></div>
      </div>
    </div>

    <div style="background:var(--white);border:1.5px solid var(--card-border);border-radius:var(--radius-card);padding:18px 20px;margin-bottom:16px;border-left:3px solid var(--accent)">
      <div style="font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px">📈 Heel jaar ${yearStr} — ${yearGesprekken} gesprekken totaal</div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:var(--green);font-weight:600">✅ Eerstelijns opgelost</span><span style="font-weight:600">${yearStats.opgelost} (${opgelostPct}%)</span></div>
        <div style="background:var(--bg);border-radius:var(--radius-pill);height:6px;overflow:hidden;margin-bottom:14px"><div style="height:6px;background:var(--green);width:${opgelostPct}%;border-radius:var(--radius-pill)"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#1d4ed8;font-weight:600">⚖️ Doorverwezen Brandmeester</span><span style="font-weight:600">${yearStats.brandmeester} (${brandmeesterPct}%)</span></div>
        <div style="background:var(--bg);border-radius:var(--radius-pill);height:6px;overflow:hidden;margin-bottom:14px"><div style="height:6px;background:#1d4ed8;width:${brandmeesterPct}%;border-radius:var(--radius-pill)"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#7c3aed;font-weight:600">🤝 Afkoop</span><span style="font-weight:600">${yearStats.afkoop}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#92400e;font-weight:600">📄 Stam Advocaten (VSO)</span><span style="font-weight:600">${yearStats.stam}</span></div>
      </div>
    </div>
  `;
}

let currentView = "vandaag";
function setView(v) {
  if (v !== currentView) activeFilter = null;
  currentView = v;
  ["vandaag","gisteren","week","vorige-week","team"].forEach(x => { const el = document.getElementById("btn-"+x); if(el) el.classList.toggle("active", x===v); });
  const today = new Date(); today.setHours(12,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (v === "vandaag") renderDay(dateKey(today), "Vandaag — " + formatDate(dateKey(today)));
  else if (v === "gisteren") renderDay(dateKey(yesterday), "Gisteren — " + formatDate(dateKey(yesterday)));
  else if (v === "vorige-week") renderWeek(getLastWeekKeys(), "Vorige week");
  else if (v === "team") renderTeam();
  else renderWeek();
}
function toggle(header) {
  const body = header.nextElementSibling;
  const isOpen = body.style.display !== "none";
  body.style.display = isOpen ? "none" : "";
  header.parentElement.classList.toggle("collapsed", isOpen);
}
function toggleCheck(el) {
  el.classList.toggle("done");
  el.textContent = el.classList.contains("done") ? "✓" : "";
  const txt = el.closest(".action-item").querySelector(".action-text");
  if (txt) txt.classList.toggle("done-text", el.classList.contains("done"));
}
function refresh() { _ghLoad(); }
setInterval(() => { _ghLoad(); }, 3 * 60 * 1000);
_ghLoad();
setView("vandaag");
</script>

      <button class="btn-annuleren" onclick="closeMergeModal()">Annuleren</button>
      <button class="btn-toevoegen" onclick="confirmSeparate()">Nee, apart toevoegen</button>
      <button class="btn-opslaan" onclick="confirmMerge()">Ja, samenvoegen</button>
    </div>
  </div>
</div>
