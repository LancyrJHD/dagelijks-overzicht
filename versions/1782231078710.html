const MONTHS_NL = ["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"];
const COLORS = { opgelost:"#2e7d32", brandmeester:"#1565c0", stam:"#b45309", afkoop:"#7b1fa2", terugbel:"#e65100", geenDekking:"#aeaeb2" };

function dateKey(d) { return d.toISOString().slice(0,10); }
function formatDate(key) {
  const d = new Date(key + "T12:00:00");
  return `${DAYS_NL[d.getDay()]} ${d.getDate()} ${MONTHS_NL[d.getMonth()]}`;
}
function getWeekKeys() {
  const today = new Date(); today.setHours(12,0,0,0);
  const dow = today.getDay();
  const monday = new Date(today); monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  const keys = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    if (d <= today) keys.push(dateKey(d));
  }
  return keys;
}

function getLastWeekKeys() {
  const today = new Date(); today.setHours(12,0,0,0);
  const dow = today.getDay();
  const thisMonday = new Date(today); thisMonday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  const lastMonday = new Date(thisMonday); lastMonday.setDate(thisMonday.getDate() - 7);
  const keys = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(lastMonday); d.setDate(lastMonday.getDate() + i);
    keys.push(dateKey(d));
  }
  return keys;
}

}

function _normPersonName(personen) {
  const m = (personen||'').match(/Verzekerde:\s*([^\xb7\n]+)/);
  if (!m) return null;
  const name = m[1].trim().toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
  if (!name || name.length < 4) return null;
  const skip = ['anoniem','onbekend','mevrouw','meneer','dhr','mevr','partner','echtgenoot'];
  if (skip.some(s => name === s || name.startsWith(s + ' '))) return null;
  // Strip Dutch tussenvoegsels voor betere naam-match
  const tussenvoegsels = new Set(['van','de','den','der','van de','van den','van der','van het','van t','ter','te','ten','het','t','in de','in het','op de']);
  let words = name.split(' ').filter(Boolean);
  // Verwijder tussenvoegsel-woorden (maar bewaar eerste en laatste niet-tussenvoegsel woord)
  const rootWords = words.filter(w => !tussenvoegsels.has(w));
  if (rootWords.length >= 2) return rootWords[0] + ' ' + rootWords[rootWords.length-1];
  if (rootWords.length === 1) return rootWords[0];
  return words.length >= 2 ? words[0] + ' ' + words[words.length-1] : name;
}
function _groupConvsByPerson(convs) {
  const seen = {}, result = [];
  (convs||[]).forEach(c => {
    const key = _normPersonName(c.personen);
    if (key && seen[key] !== undefined) {
      result[seen[key]].push(c);
    } else {
      const idx = result.length;
      result.push([c]);
      if (key) seen[key] = idx;
    }
  });
  return result;
}
function _statsFromGroups(groups) {
  const s = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0,stam:0};
  groups.forEach(group => {
    const uit = Array.isArray(group[0].uitkomst) ? group[0].uitkomst[0] : group[0].uitkomst;
    const isVso = group.some(g => /vso|vaststellingsovereenkomst/i.test((g.titel||'')+(g.samenvatting||'')));
    if (uit === 'outcome-opgelost' || uit === 'outcome-verkeerd') {
      s.opgelost++;
      if (isVso) s.stam++;
    } else if (uit === 'outcome-brandmeester') s.brandmeester++;
    else if (uit === 'outcome-afkoop') s.afkoop++;
    else if (uit === 'outcome-terugbel') s.terugbel++;
    else if (uit === 'outcome-geen-dekking') s.geenDekking++;
    else if (uit === 'outcome-stam') { s.stam++; s.opgelost++; }
  });
  return s;
}

// ===================== JARGON FILTER =====================
const _jargonMap = [
  [/routeringsgesprekken?/gi, 'gesprekken die verkeerd binnenkwamen'],
  [/misdirected calls?/gi, 'verkeerd doorverbonden telefoontjes'],
  [/dekkingsspanning/gi, 'onduidelijkheid over wat de polis dekt'],
  [/procesuitzondering/gi, 'uitzondering op het normale proces'],
  [/polisverificatie/gi, 'controle van de polis'],
  [/franchise[-\s]check/gi, 'controle van het eigen risico'],
  [/doorverwijzingsdrempel/gi, 'grens voor doorverwijzen'],
  [/uitloopperiode/gi, 'periode na beëindigen polis'],
  [/synth?ronisatie[-\s]probleem/gi, 'systeem-synchronisatieprobleem'],
];
function _jargonFilter(text) {
  if (!text) return text;
  let out = text;
  _jargonMap.forEach(([pat, rep]) => { out = out.replace(pat, rep); });
  return out;
}

function buildWeekAnalyse(keys) {
  const allGoed = [], allBeter = [];
  let scoreSum = 0, scoreDays = 0;
  keys.forEach(k => {
    const d = weekData[k]; if (!d || !d.analyse) return;
    const dag = formatDate(k);
    d.analyse.goed.forEach(t => allGoed.push({ dag, t }));
    d.analyse.beter.forEach(t => allBeter.push({ dag, t }));
    if (d.score > 0) { scoreSum += d.score; scoreDays++; }
  });
  const avgScore = scoreDays > 0 ? (scoreSum/scoreDays).toFixed(1) : null;
  if (allGoed.length === 0 && allBeter.length === 0) return '';
  return `<div class="section">
    <div class="section-header" onclick="toggle(this)">
      <div class="section-icon" style="background:#f3e5f5">📊</div>
      <div class="section-title">Kwaliteitsanalyse — hele week${avgScore ? ` · ⭐ ${avgScore}/10` : ''}</div>
      <span class="chevron">▼</span>
    </div>
    <div class="section-body">
      <div class="analyse-grid" style="padding:16px 18px">
        <div>
          <div class="analyse-col-title goed">✅ Wat ging goed</div>
          ${allGoed.map(({dag,t}) => `<div class="analyse-point"><div class="analyse-icon">✓</div><div class="analyse-text"><span style="font-size:11px;color:#6e6e73;font-weight:500">${dag}:</span> ${_jargonFilter(t)}</div></div>`).join('') || '<div style="color:#aeaeb2;font-size:13px">Geen data.</div>'}

function renderWeek(keysOverride, labelOverride) {

  keys.forEach(k => {
    const d = weekData[k];
    const m = getManualStats(k);
    const merged = mergeStats(d?.stats, m.stats);

    if (total > 0 || d?.gesprekken > 0) {
      totals.opgelost += merged.opgelost; totals.brandmeester += merged.brandmeester;
      totals.afkoop += merged.afkoop; totals.terugbel += merged.terugbel; totals.geenDekking += merged.geenDekking;

      if (d?.score > 0) { scoreSum += d.score; scoreDays++; }

  const tableRows = keys.map(k => {
    const d = weekData[k];

    const total = (d?.gesprekken || 0) + m.count;
    const dateObj = new Date(k + "T12:00:00");

    const manualTag = m.count > 0 ? ` <span style="font-size:10px;color:#6e6e73;font-weight:400">(+${m.count}📧)</span>` : '';

  const allConvs = keys.map(k => {
    const d = weekData[k];
    return (!d || !d.conversations || d.conversations.length === 0) ? "" : buildConversations(d.conversations, true, formatDate(k), d.score);

  const allManualWeek = keys.filter(k => getManualEntries(k).length > 0).map(k => buildManualSection(k)).join("");
  const allActies = keys.flatMap(k => weekData[k]?.acties || []);
  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="drukte-banner rustig" style="background:#e8f0fe;border-color:#c5d8fd">

      ${tableRows}
      <div class="week-totals"><div>Totaal</div><div style="text-align:center;color:#2e7d32">${totals.opgelost}</div><div style="text-align:center;color:#1565c0">${totals.brandmeester}</div><div style="text-align:center;color:#7b1fa2">${totals.afkoop}</div><div style="text-align:center;color:#e65100">${totals.terugbel}</div><div style="text-align:center;color:#aeaeb2">${totals.geenDekking}</div><div style="text-align:right">${avgScore !== null ? avgScore.toFixed(1) : "—"}</div></div>
    </div>
    ${buildStats(totals)}
    ${buildOKRWeekBanner(totals)}
    ${buildFilterBanner(keys.flatMap(k => weekData[k]?.conversations||[]), keys.flatMap(k => getManualEntries(k)))}
    ${buildChart(totals)}
    <div class="section">
      <div class="section-header" onclick="toggle(this)"><div class="section-icon" style="background:#e3f2fd">💬</div><div class="section-title">Alle gesprekken deze week</div><span class="section-count">${keys.reduce((a,k)=>(weekData[k]?.gesprekken||0)+a,0)}</span><span class="chevron">▼</span></div>
      <div class="section-body">${allConvs || '<div style="padding:16px 18px;color:#aeaeb2;font-size:13px">Nog geen gesprekken deze week.</div>'}</div>

}

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#2e7d32">${monthStats.opgelost}</div><div style="font-size:11px;color:#6e6e73">Opgelost</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#1565c0">${monthStats.brandmeester}</div><div style="font-size:11px;color:#6e6e73">Brandmeester</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#7b1fa2">${monthStats.afkoop}</div><div style="font-size:11px;color:#6e6e73">Afkoop</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#e65100">${monthStats.terugbel}</div><div style="font-size:11px;color:#6e6e73">Terugbellen</div></div>
      </div>
    </div>

    <!-- Jaar statistieken -->
    <div style="background:#fff;border:1px solid #e5e5e5;border-radius:0;padding:16px 18px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:#2D0051;margin-bottom:12px">📈 Heel jaar ${yearStr} — ${yearGesprekken} gesprekken totaal</div>
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#2e7d32;font-weight:600">✅ Eerstelijns opgelost</span><span>${yearStats.opgelost} (${opgelostPct}%)</span></div>
        <div style="background:#f0f0f3;border-radius:4px;height:6px;overflow:hidden;margin-bottom:10px"><div style="height:6px;background:#2e7d32;width:${opgelostPct}%;border-radius:4px"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#1565c0;font-weight:600">⚖️ Doorverwezen Brandmeester</span><span>${yearStats.brandmeester} (${brandmeesterPct}%)</span></div>
        <div style="background:#f0f0f3;border-radius:4px;height:6px;overflow:hidden;margin-bottom:10px"><div style="height:6px;background:#1565c0;width:${brandmeesterPct}%;border-radius:4px"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#7b1fa2;font-weight:600">🤝 Afkoop</span><span>${yearStats.afkoop}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#b45309;font-weight:600">📄 Stam Advocaten (VSO)</span><span>${yearStats.stam}</span></div>
      </div>
    </div>
  `;
}
let currentView = "vandaag";
function setView(v) {
  if (v !== currentView) activeFilter = null;
  currentView = v;
  ["vandaag","gisteren","week","vorige-week","team"].forEach(x => { const el = document.getElementById("btn-"+x); if(el) el.classList.toggle("active", x===v); });
  const today = new Date(); today.setHours(12,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (v === "vandaag") renderDay(dateKey(today), "Vandaag — " + formatDate(dateKey(today)));
  else if (v === "gisteren") renderDay(dateKey(yesterday), "Gisteren — " + formatDate(dateKey(yesterday)));
  else if (v === "vorige-week") renderWeek(getLastWeekKeys(), "Vorige week");
  else if (v === "team") renderTeam();
  else renderWeek();
}
function toggle(header) {
  const body = header.nextElementSibling;
  const isOpen = body.style.display !== "none";
  body.style.display = isOpen ? "none" : "";
  header.parentElement.classList.toggle("collapsed", isOpen);
}
function toggleCheck(el) {
  el.classList.toggle("done");
  el.textContent = el.classList.contains("done") ? "✓" : "";
  const txt = el.closest(".action-item").querySelector(".action-text");
  if (txt) txt.classList.toggle("done-text", el.classList.contains("done"));
}
function refresh() { _ghLoad(); } // haalt GitHub data opnieuw op
setInterval(() => { _ghLoad(); }, 3 * 60 * 1000); // auto-sync elke 3 minuten
_ghLoad(); // laad GitHub data en render daarna
setView("vandaag"); // initieel renderen (zonder manual entries, worden na load toegevoegd)
</script>
