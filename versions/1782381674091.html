// ===================== MANUAL ENTRIES (localStorage) =====================
const MANUAL_OUTCOMES = [
  ["outcome-opgelost","Eerstelijns opgelost"],
  ["outcome-brandmeester","Doorverwezen naar Brandmeester"],
  ["outcome-afkoop","Afkoop"],
  ["outcome-terugbel","Terugbellen"],
  ["outcome-geen-dekking","Geen dekking / niet kunnen helpen"],
  ["outcome-verkeerd","Verkeerd nummer"]
];

function getManualEntries(key) {
  try { return JSON.parse(localStorage.getItem('lancyr-manual-' + key) || '[]'); }
  catch(e) { return []; }
}
function saveManualEntries(key, entries) {
  localStorage.setItem('lancyr-manual-' + key, JSON.stringify(entries));
}
function deleteManualEntry(key, id) {
  saveManualEntries(key, getManualEntries(key).filter(e => e.id !== id));
  setView(currentView);
}
function getManualStats(key) {
  const entries = getManualEntries(key);
  const s = { opgelost:0, brandmeester:0, afkoop:0, terugbel:0, geenDekking:0 };
  entries.forEach(e => {
    if (e.uitkomst === 'outcome-opgelost' || e.uitkomst === 'outcome-verkeerd') s.opgelost++;
    else if (e.uitkomst === 'outcome-brandmeester') s.brandmeester++;
    else if (e.uitkomst === 'outcome-afkoop') s.afkoop++;
    else if (e.uitkomst === 'outcome-terugbel') s.terugbel++;
    else if (e.uitkomst === 'outcome-geen-dekking') s.geenDekking++;
  });
  return { count: entries.length, stats: s };
}
function mergeStats(granolaStats, manualStats) {
  return {
    opgelost:     (granolaStats?.opgelost     || 0) + manualStats.opgelost,
    brandmeester: (granolaStats?.brandmeester || 0) + manualStats.brandmeester,
    afkoop:       (granolaStats?.afkoop       || 0) + manualStats.afkoop,
    terugbel:     (granolaStats?.terugbel     || 0) + manualStats.terugbel,
    geenDekking:  (granolaStats?.geenDekking  || 0) + manualStats.geenDekking
  };
}
function toggleManualForm(key) {
  const f = document.getElementById('manual-form-' + key);
  if (f) f.classList.toggle('hidden');
}
function onManualOutcomeChange(key) {
  const v = document.getElementById('manual-uitkomst-' + key)?.value || '';
  const row = document.getElementById('manual-schadenr-row-' + key);
  if (row) row.style.display = (v === 'outcome-afkoop' || v === 'outcome-brandmeester') ? '' : 'none';
}
function saveManualEntry(key) {
  const g = id => document.getElementById(id)?.value?.trim() || '';
  const uitkomst = g('manual-uitkomst-' + key);
  if (!uitkomst) { alert('Selecteer eerst een uitkomst.'); return; }
  const label = MANUAL_OUTCOMES.find(([v]) => v === uitkomst)?.[1] || uitkomst;
  const entry = {
    id: Date.now().toString(),
    ticketnummer:  g('manual-ticket-' + key),
    type:          g('manual-type-' + key),
    uitkomst,
    uitkomstLabel: label,
    naamVerzekerde: g('manual-naam-' + key),
    telefoon:      g('manual-tel-' + key),
    email:         g('manual-email-' + key),
    schadenummer:  g('manual-schadenr-' + key),
    opmerkingen:   g('manual-opmerking-' + key)
  };
  const entries = getManualEntries(key);
  entries.push(entry);
  saveManualEntries(key, entries);
  setView(currentView);
}
function buildManualSection(key) {
  const entries = getManualEntries(key);
  const opts = MANUAL_OUTCOMES.map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
  const cards = entries.map(e => {
    const schadenrTag = e.schadenummer ? `<span class="tag tag-schadenr">📋 ${e.schadenummer}</span> ` : '';
    const typeTag = e.type ? `<span class="tag tag-overig">${e.type}</span> ` : '';
    const ticketTag = e.ticketnummer ? `<span class="tag tag-overig">🎫 #${e.ticketnummer}</span> ` : '';
    const contact = [e.naamVerzekerde, e.telefoon, e.email].filter(Boolean).join(' · ');
    return `<div class="manual-entry">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
          <span style="font-size:13px;font-weight:600">${e.naamVerzekerde || 'Anoniem'}</span>
          ${ticketTag}${typeTag}
        </div>
        ${contact ? `<div class="conv-persons">${contact}</div>` : ''}
        ${e.opmerkingen ? `<div class="conv-summary" style="margin-bottom:6px">${e.opmerkingen}</div>` : ''}
        <div class="conv-footer">${schadenrTag}<span class="outcome-badge ${e.uitkomst}">${e.uitkomstLabel}</span></div>
      </div>
      <button class="btn-delete" onclick="deleteManualEntry('${key}','${e.id}')" title="Verwijderen">✕</button>
    </div>`;
  }).join('');

  return `<div class="section">
    <div class="section-header" onclick="toggle(this)">
      <div class="section-icon" style="background:#fff8e1">📧</div>
      <div class="section-title">Handmatige invoer — tickets &amp; e-mail</div>
      <span class="section-count">${entries.length}</span>
      <span class="chevron">▼</span>
    </div>
    <div class="section-body">
      ${entries.length === 0 ? '<div style="padding:12px 18px;color:#aeaeb2;font-size:13px;font-style:italic">Geen handmatige invoer voor deze dag.</div>' : cards}
      <div class="manual-add-row">
        <button class="btn-toevoegen" onclick="toggleManualForm('${key}')">＋ Ticket / mail toevoegen</button>
      </div>
      <div class="manual-form hidden" id="manual-form-${key}">
        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label">Ticketnummer</label>
            <input id="manual-ticket-${key}" class="form-input" type="text" placeholder="2345">
          </div>
          <div class="form-group">
            <label class="form-label">Type</label>
            <select id="manual-type-${key}" class="form-select">
              <option value="Nieuw binnengekomen via e-mail">Nieuw binnengekomen via e-mail</option>
              <option value="Vervolg op oud ticket">Vervolg op oud ticket</option>
            </select>
          </div>
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label">Uitkomst *</label>
            <select id="manual-uitkomst-${key}" class="form-select" onchange="onManualOutcomeChange('${key}')">
              <option value="">— kies uitkomst —</option>
              ${opts}
            </select>
          </div>
          <div class="form-group" id="manual-schadenr-row-${key}" style="display:none">
            <label class="form-label">Schadenummer Lancyr</label>
            <input id="manual-schadenr-${key}" class="form-input" type="text" placeholder="26-045-12">
          </div>
        </div>
        <div class="form-row-3">
          <div class="form-group">
            <label class="form-label">Naam verzekerde</label>
            <input id="manual-naam-${key}" class="form-input" type="text" placeholder="Jan Jansen">
          </div>
          <div class="form-group">
            <label class="form-label">Telefoonnummer</label>
            <input id="manual-tel-${key}" class="form-input" type="text" placeholder="06-12345678">
          </div>
          <div class="form-group">
            <label class="form-label">E-mailadres</label>
            <input id="manual-email-${key}" class="form-input" type="email" placeholder="jan@voorbeeld.nl">
          </div>
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">Opmerkingen</label>
          <textarea id="manual-opmerking-${key}" class="form-textarea" placeholder="Bijv. wilde eerst afkopen maar toch doorgestuurd naar Brandmeester omdat…"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn-opslaan" onclick="saveManualEntry('${key}')">Opslaan</button>
          <button class="btn-annuleren" onclick="toggleManualForm('${key}')">Annuleren</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ===================== DISPLAY HELPERS =====================
const DAYS_NL = ["zondag","maandag","dinsdag","woensdag","donderdag","vrijdag","zaterdag"];
const MONTHS_NL = ["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"];
const COLORS = { opgelost:"#2e7d32", brandmeester:"#1565c0", afkoop:"#7b1fa2", terugbel:"#e65100", geenDekking:"#aeaeb2" };

function dateKey(d) { return d.toISOString().slice(0,10); }
function formatDate(key) {
  const d = new Date(key + "T12:00:00");
  return `${DAYS_NL[d.getDay()]} ${d.getDate()} ${MONTHS_NL[d.getMonth()]}`;
}
function getWeekKeys() {
  const today = new Date(); today.setHours(12,0,0,0);
  const dow = today.getDay();
  const monday = new Date(today); monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  const keys = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    if (d <= today) keys.push(dateKey(d));
  }
  return keys;
}

let chart = null;

function drukteBadge(granolaGesprekken, totalGesprekken) {
  if (totalGesprekken === 0 && granolaGesprekken === 0) return { cls:"rustig", icon:"😴", label:"Geen gesprekken", sub:"Geen Granola-gesprekken gevonden voor vandaag." };
  const drukte = totalGesprekken >= 6 ? "druk" : totalGesprekken >= 4 ? "matig" : "rustig";
  const icon = drukte === "druk" ? "🔥" : drukte === "matig" ? "🟡" : "🟢";
  const label = drukte === "druk" ? "Drukke dag" : drukte === "matig" ? "Gemiddelde dag" : "Rustige dag";
  const sub = `${totalGesprekken} gesprekken${totalGesprekken !== granolaGesprekken ? ` (${granolaGesprekken} Granola + ${totalGesprekken - granolaGesprekken} handmatig)` : ""}`;
  return { cls: drukte, icon, label, sub };
}

function buildStats(stats) {
  return `<div class="stats-grid">
    <div class="stat-card opgelost"><div class="number">${stats.opgelost}</div><div class="label">Eerstelijns opgelost</div></div>
    <div class="stat-card brandmeester"><div class="number">${stats.brandmeester}</div><div class="label">→ Brandmeester</div></div>
    <div class="stat-card afkoop"><div class="number">${stats.afkoop}</div><div class="label">Afgehandeld / afkoop</div></div>
    <div class="stat-card terugbel"><div class="number">${stats.terugbel}</div><div class="label">Terugbellen</div></div>
    <div class="stat-card geen-dekking"><div class="number">${stats.geenDekking}</div><div class="label">Geen dekking</div></div>
  </div>`;
}

function buildChart(stats) {
  const total = Object.values(stats).reduce((a,b) => a+b, 0) || 1;
  const pct = n => Math.round(n/total*100);
  return `<div class="chart-row">
    <div><div class="chart-title">Uitkomsten verdeling</div><div class="chart-wrap"><canvas id="uitkomstenChart"></canvas></div></div>
    <div class="chart-legend">
      ${[["#2e7d32","Eerstelijns opgelost",stats.opgelost],["#1565c0","→ Brandmeester",stats.brandmeester],["#7b1fa2","Afkoop",stats.afkoop],["#e65100","Terugbellen",stats.terugbel],["#aeaeb2","Geen dekking",stats.geenDekking]].map(([col,name,n]) => `
        <div class="legend-item">
          <div class="legend-dot" style="background:${col}"></div>
          <div class="legend-name">${name}</div>
          <div class="legend-bar-wrap"><div class="legend-bar" style="width:${pct(n)}%;background:${col}"></div></div>
          <div class="legend-count">${n}</div>
        </div>`).join("")}
    </div>
  </div>`;
}

function initChart(stats) {
  const canvas = document.getElementById("uitkomstenChart");
  if (!canvas) return;
  if (chart) { chart.destroy(); chart = null; }
  chart = new Chart(canvas.getContext("2d"), {
    type: "doughnut",
    data: { labels: ["Opgelost","→ Brandmeester","Afkoop","Terugbellen","Geen dekking"], datasets: [{ data: [stats.opgelost,stats.brandmeester,stats.afkoop,stats.terugbel,stats.geenDekking], backgroundColor: Object.values(COLORS), borderWidth: 2, borderColor: "#fff" }] },
    options: { cutout:"68%", plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw}`}}}, animation:{animateRotate:true}}
  });
}

function buildConversations(convs, showDagHeader, dagLabel, dagScore) {
  if (!convs || convs.length === 0) return `<div style="padding:16px 18px;color:#aeaeb2;font-size:13px;">Geen gesprekken geregistreerd.</div>`;
  let html = "";
  if (showDagHeader) html += `<div class="dag-header"><span>${dagLabel}</span>${dagScore != null ? `<span class="dag-score">⭐ ${dagScore.toFixed(1)}/10</span>` : ""}</div>`;
  html += convs.map(c => `
    <div class="conv-item">
      <div class="conv-time">${c.tijd}</div>
      <div>
        <div class="conv-title">${c.titel}</div>
        <div class="conv-persons">${c.personen}</div>
        <div class="conv-summary">${c.samenvatting}</div>
        <div class="conv-footer">
          ${c.tags.map(([cls,lbl]) => `<span class="tag ${cls}">${lbl}</span>`).join("")}
          <span class="outcome-badge ${c.uitkomst[0]}">${c.uitkomst[1]}</span>
        </div>
      </div>
    </div>`).join("");
  return html;
}

function buildActies(acties) {
  if (!acties || acties.length === 0) return `<div style="padding:16px 18px;color:#aeaeb2;font-size:13px;">Geen openstaande actiepunten.</div>`;
  return acties.map((a,i) => `
    <div class="action-item">
      <div class="prio-dot ${a.prio}"></div>
      <div class="check-box" onclick="toggleCheck(this)" id="chk-${i}"></div>
      <div style="flex:1">
        <div class="action-text">${a.tekst}</div>
        <div class="action-meta"><span class="action-owner">👤 ${a.eigenaar}</span><span class="${a.deadline}">⏰ ${a.deadlineTekst}</span></div>
      </div>
    </div>`).join("");
}

function buildAnalyse(analyse, score) {
  return `
    <div class="analyse-score">
      <div class="score-label">Dagkwaliteit</div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${score*10}%"></div></div>
      <div class="score-num">${score > 0 ? score.toFixed(1) + ' / 10' : '—'}</div>
    </div>
    <div class="analyse-divider"></div>
    <div class="analyse-grid">
      <div>
        <div class="analyse-col-title goed">✅ Wat ging goed</div>
        ${analyse.goed.length ? analyse.goed.map(t => `<div class="analyse-point"><div class="analyse-icon">✓</div><div class="analyse-text">${t}</div></div>`).join("") : '<div style="color:#aeaeb2;font-size:13px">Geen data.</div>'}
      </div>
      <div>
        <div class="analyse-col-title beter">⚠️ Wat kon beter</div>
        ${analyse.beter.length ? analyse.beter.map(t => `<div class="analyse-point"><div class="analyse-icon">!</div><div class="analyse-text">${t}</div></div>`).join("") : '<div style="color:#aeaeb2;font-size:13px">Geen data.</div>'}
      </div>
    </div>`;
}

// ===================== VIEWS =====================
function renderDay(key, headerLabel) {
  const d = weekData[key];
  const app = document.getElementById("app");
  document.getElementById("header-date").textContent = headerLabel;

  const manualData = getManualStats(key);
  const granolaStats = d?.stats || {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0};
  const granolaCount = d?.gesprekken || 0;
  const totalCount = granolaCount + manualData.count;
  const merged = mergeStats(granolaStats, manualData.stats);
  const db = drukteBadge(granolaCount, totalCount);

  if (!d && totalCount === 0) {
    app.innerHTML = `<div style="padding:40px;text-align:center;color:#aeaeb2;font-size:13px;">Geen data beschikbaar voor ${formatDate(key)}.</div>
      ${buildManualSection(key)}`;
    return;
  }

  app.innerHTML = `
    <div class="drukte-banner ${db.cls}">
      <div class="drukte-icon">${db.icon}</div>
      <div><div class="drukte-label">${db.label}</div><div class="drukte-sub">${db.sub}</div></div>
    </div>
    ${buildStats(merged)}
    ${buildChart(merged)}
    <div class="section">
      <div class="section-header" onclick="toggle(this)">
        <div class="section-icon" style="background:#e3f2fd">💬</div>
        <div class="section-title">Telefoongesprekken (Granola)</div>
        <span class="section-count">${granolaCount}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">${buildConversations(d?.conversations)}</div>
    </div>
    ${buildManualSection(key)}
    <div class="section">
      <div class="section-header" onclick="toggle(this)">
        <div class="section-icon" style="background:#e8f5e9">✅</div>
        <div class="section-title">Actiepunten</div>
        <span class="section-count">${d?.acties?.length || 0}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">${buildActies(d?.acties)}</div>
    </div>
    <div class="section">
      <div class="section-header" onclick="toggle(this)">
        <div class="section-icon" style="background:#f3e5f5">📊</div>
        <div class="section-title">Kwaliteitsanalyse</div>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">${d ? buildAnalyse(d.analyse, d.score) : '<div style="padding:16px 18px;color:#aeaeb2;font-size:13px">Geen analyse beschikbaar.</div>'}</div>
    </div>`;
  initChart(merged);
}

function renderWeek() {
  document.getElementById("header-date").textContent = "Weekoverzicht";
  const keys = getWeekKeys();
  const todayKey = dateKey(new Date());
  const totals = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0};
  let totalGesprekken = 0, scoreSum = 0, scoreDays = 0;

  keys.forEach(k => {
    const d = weekData[k];
    const m = getManualStats(k);
    const merged = mergeStats(d?.stats, m.stats);
    const total = (d?.gesprekken || 0) + m.count;
    if (total > 0 || d?.gesprekken > 0) {
      totals.opgelost += merged.opgelost; totals.brandmeester += merged.brandmeester;
      totals.afkoop += merged.afkoop; totals.terugbel += merged.terugbel; totals.geenDekking += merged.geenDekking;
      totalGesprekken += total;
      if (d?.score > 0) { scoreSum += d.score; scoreDays++; }
    }
  });
  const avgScore = scoreDays > 0 ? scoreSum / scoreDays : null;
  const DAGNAMEN = ["Ma","Di","Wo","Do","Vr","Za","Zo"];

  const tableRows = keys.map(k => {
    const d = weekData[k];
    const m = getManualStats(k);
    const merged = mergeStats(d?.stats, m.stats);
    const total = (d?.gesprekken || 0) + m.count;
    const dateObj = new Date(k + "T12:00:00");
    const dagNaam = DAGNAMEN[dateObj.getDay() === 0 ? 6 : dateObj.getDay() - 1];
    const dagNum = `${dateObj.getDate()} ${MONTHS_NL[dateObj.getMonth()]}`;
    const isToday = k === todayKey;
    const manualTag = m.count > 0 ? ` <span style="font-size:10px;color:#6e6e73;font-weight:400">(+${m.count}📧)</span>` : '';
    if (total === 0) return `<div class="week-row${isToday?" today":""}"><div class="week-day">${dagNaam}${isToday?" 🔵":""}<div class="date-sub">${dagNum}</div></div><div class="week-empty" style="grid-column:2/8">${d ? "Geen gesprekken" : "Geen data"}</div></div>`;
    const scoreClass = d?.score >= 8 ? "high" : d?.score >= 6.5 ? "mid" : "low";
    return `<div class="week-row${isToday?" today":""}"><div class="week-day">${dagNaam}${isToday?" 🔵":""}${manualTag}<div class="date-sub">${dagNum}</div></div><div class="week-num green">${merged.opgelost}</div><div class="week-num blue">${merged.brandmeester}</div><div class="week-num purple">${merged.afkoop}</div><div class="week-num orange">${merged.terugbel}</div><div class="week-num gray">${merged.geenDekking}</div><div class="week-score ${scoreClass}">${d?.score > 0 ? d.score.toFixed(1) : '—'}</div></div>`;
  }).join("");

  const allConvs = keys.map(k => {
    const d = weekData[k];
    if (!d || !d.conversations || d.conversations.length === 0) return "";
    return buildConversations(d.conversations, true, formatDate(k), d.score);
  }).join("");
  const allActies = keys.flatMap(k => weekData[k]?.acties || []);
  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="drukte-banner rustig" style="background:#e8f0fe;border-color:#c5d8fd">
      <div class="drukte-icon">📅</div>
      <div><div class="drukte-label" style="color:#1a1a2e">Week totaal — ${totalGesprekken} gesprekken</div><div class="drukte-sub">${keys.length} dagen · ${scoreDays} dag(en) met data${avgScore !== null ? ` · gem. score ${avgScore.toFixed(1)}/10` : ""}</div></div>
    </div>
    <div class="week-table">
      <div class="week-table-header"><div>Dag</div><div style="text-align:center;color:#2e7d32">✅ Opgelost</div><div style="text-align:center;color:#1565c0">⚖️ Brandm.</div><div style="text-align:center;color:#7b1fa2">🤝 Afkoop</div><div style="text-align:center;color:#e65100">📞 Terug</div><div style="text-align:center;color:#aeaeb2">🚫 Geen</div><div style="text-align:right">Score</div></div>
      ${tableRows}
      <div class="week-totals"><div>Totaal</div><div style="text-align:center;color:#2e7d32">${totals.opgelost}</div><div style="text-align:center;color:#1565c0">${totals.brandmeester}</div><div style="text-align:center;color:#7b1fa2">${totals.afkoop}</div><div style="text-align:center;color:#e65100">${totals.terugbel}</div><div style="text-align:center;color:#aeaeb2">${totals.geenDekking}</div><div style="text-align:right">${avgScore !== null ? avgScore.toFixed(1) : "—"}</div></div>
    </div>
    ${buildStats(totals)}
    ${buildChart(totals)}
    <div class="section">
      <div class="section-header" onclick="toggle(this)"><div class="section-icon" style="background:#e3f2fd">💬</div><div class="section-title">Alle gesprekken deze week</div><span class="section-count">${keys.reduce((a,k)=>(weekData[k]?.gesprekken||0)+a,0)}</span><span class="chevron">▼</span></div>
      <div class="section-body">${allConvs || '<div style="padding:16px 18px;color:#aeaeb2;font-size:13px">Nog geen gesprekken deze week.</div>'}</div>
    </div>
    <div class="section">
      <div class="section-header" onclick="toggle(this)"><div class="section-icon" style="background:#e8f5e9">✅</div><div class="section-title">Openstaande actiepunten</div><span class="section-count">${allActies.length}</span><span class="chevron">▼</span></div>
      <div class="section-body">${buildActies(allActies)}</div>
    </div>`;
  initChart(totals);
}

let currentView = "vandaag";
function setView(v) {
  currentView = v;
  ["vandaag","gisteren","week"].forEach(x => document.getElementById("btn-"+x).classList.toggle("active", x===v));
  const today = new Date(); today.setHours(12,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (v === "vandaag") renderDay(dateKey(today), "Vandaag — " + formatDate(dateKey(today)));
  else if (v === "gisteren") renderDay(dateKey(yesterday), "Gisteren — " + formatDate(dateKey(yesterday)));
  else renderWeek();
}
function toggle(header) {
  const body = header.nextElementSibling;
  const isOpen = body.style.display !== "none";
  body.style.display = isOpen ? "none" : "";
  header.parentElement.classList.toggle("collapsed", isOpen);
}
function toggleCheck(el) {
  el.classList.toggle("done");
  el.textContent = el.classList.contains("done") ? "✓" : "";
  const txt = el.closest(".action-item").querySelector(".action-text");
  if (txt) txt.classList.toggle("done-text", el.classList.contains("done"));
}
function refresh() { setView(currentView); }
setView("vandaag");
</script>
