/* === DAG-HEADER (for week view conv sections) === */

.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--gold); }
.form-textarea { min-height: 64px; resize: vertical; }
.form-actions { display: flex; gap: 8px; margin-top: 6px; }
.btn-opslaan {
  background: var(--navy); color: #fff; padding: 7px 20px;

.check-box {
  width: 16px; height: 16px; border: 2px solid var(--card-border);

.check-box.done { background: var(--green); border-color: var(--green); color: #fff; }

.hidden { display: none !important; }
.merge-modal-overlay {
  position: fixed; inset: 0; background: rgba(13,31,46,.55);

.merge-modal {

function toggleManualForm(key) {

function onManualOutcomeChange(key) {
  const v = document.getElementById('manual-uitkomst-' + key)?.value || '';

let _pendingMerge = null;
function _normName(s) { return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'').trim(); }
function _findMatchingConv(key, naam) {
  const convs = weekData[key]?.conversations || [];
  const needle = _normName(naam);
  if (!needle) return null;
  return convs.find(c => {
    const hay = _normName(c.personen + ' ' + c.titel);
    return needle.split(' ').filter(w=>w.length>2).every(w => hay.includes(w));
  }) || null;
}
function saveManualEntry(key) {
  const g = id => document.getElementById(id)?.value?.trim() || '';
  const uitkomst = g('manual-uitkomst-' + key);
  if (!uitkomst) { alert('Selecteer eerst een uitkomst.'); return; }
  const label = MANUAL_OUTCOMES.find(([v]) => v === uitkomst)?.[1] || uitkomst;
  const naam = g('manual-naam-' + key);
  const entry = {
    id: Date.now().toString(),
    ticketnummer:  g('manual-ticket-' + key),
    type:          g('manual-type-' + key),
    uitkomst, uitkomstLabel: label,
    naamVerzekerde: naam,
    telefoon:      g('manual-tel-' + key),
    email:         g('manual-email-' + key),
    schadenummer:  g('manual-schadenr-' + key),
    opmerkingen:   g('manual-opmerking-' + key)
  };
  if (naam) {
    const match = _findMatchingConv(key, naam);
    if (match) {
      _pendingMerge = { key, entry, match };
      const body = document.getElementById('mergeModalBody');
      body.innerHTML = `Is <span class="merge-modal-name">${naam}</span> dezelfde persoon als in het gesprek hieronder?`
        + `<div class="merge-modal-conv"><strong>${match.tijd} — ${match.titel}</strong><br>${match.personen}<br><em>${match.samenvatting}</em></div>`
        + `Kies <b>Ja</b> om samen te voegen (telt niet dubbel mee in statistieken), of <b>Nee</b> om apart toe te voegen.`;
      document.getElementById('mergeModal').classList.remove('hidden');
      return;
    }
  }
  _doSaveEntry(key, entry);
}
function confirmMerge() {
  if (!_pendingMerge) return;
  const { key, entry, match } = _pendingMerge;
  entry.gelinktMetGesprek = { tijd: match.tijd, titel: match.titel };
  _doSaveEntry(key, entry);
  closeMergeModal();

function confirmSeparate() {
  if (!_pendingMerge) return;
  const { key, entry } = _pendingMerge;
  _doSaveEntry(key, entry);
  closeMergeModal();
}

const MONTHS_NL = ["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"];
const COLORS = { opgelost:"#436436", brandmeester:"#AE986F", stam:"#8a6540", afkoop:"#1a5c8a", terugbel:"#0D1F2E", geenDekking:"#8a96a0" };

function dateKey(d) { return d.toISOString().slice(0,10); }
function formatDate(key) {
  const d = new Date(key + "T12:00:00");
  return `${DAYS_NL[d.getDay()]} ${d.getDate()} ${MONTHS_NL[d.getMonth()]}`;
}
function getWeekKeys() {
  const today = new Date(); today.setHours(12,0,0,0);
  const dow = today.getDay();
  const monday = new Date(today); monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  const keys = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    if (d <= today) keys.push(dateKey(d));
  }
  return keys;
}
function getLastWeekKeys() {
  const today = new Date(); today.setHours(12,0,0,0);
  const dow = today.getDay();
  const thisMonday = new Date(today); thisMonday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  const lastMonday = new Date(thisMonday); lastMonday.setDate(thisMonday.getDate() - 7);
  const keys = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(lastMonday); d.setDate(lastMonday.getDate() + i);
    keys.push(dateKey(d));
  }
  return keys;
}

function drukteBadge(granolaGesprekken, totalGesprekken) {

  const drukte = totalGesprekken >= 6 ? "druk" : totalGesprekken >= 4 ? "matig" : "rustig";
  const icon = drukte === "druk" ? "🔥" : drukte === "matig" ? "🟡" : "🟢";
  const label = drukte === "druk" ? "Drukke dag" : drukte === "matig" ? "Gemiddelde dag" : "Rustige dag";
  const sub = `${totalGesprekken} gesprekken${totalGesprekken !== granolaGesprekken ? ` (${granolaGesprekken} Granola + ${totalGesprekken - granolaGesprekken} handmatig)` : ""}`;
  return { cls: drukte, icon, label, sub };
}

function _normPersonName(personen) {
  const m = (personen||'').match(/Verzekerde:\s*([^\xb7\n]+)/);
  if (!m) return null;
  const name = m[1].trim().toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
  if (!name || name.length < 4) return null;
  const skip = ['anoniem','onbekend','mevrouw','meneer','dhr','mevr','partner','echtgenoot'];
  if (skip.some(s => name === s || name.startsWith(s + ' '))) return null;
  const tussenvoegsels = new Set(['van','de','den','der','van de','van den','van der','van het','van t','ter','te','ten','het','t','in de','in het','op de']);
  let words = name.split(' ').filter(Boolean);
  const rootWords = words.filter(w => !tussenvoegsels.has(w));
  if (rootWords.length >= 2) return rootWords[0] + ' ' + rootWords[rootWords.length-1];
  if (rootWords.length === 1) return rootWords[0];
  return words.length >= 2 ? words[0] + ' ' + words[words.length-1] : name;
}
function _groupConvsByPerson(convs) {
  const seen = {}, result = [];
  (convs||[]).forEach(c => {
    const key = _normPersonName(c.personen);
    if (key && seen[key] !== undefined) { result[seen[key]].push(c); }
    else { const idx = result.length; result.push([c]); if (key) seen[key] = idx; }
  });
  return result;
}
function _statsFromGroups(groups) {
  const s = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0,stam:0};
  groups.forEach(group => {
    const uit = Array.isArray(group[0].uitkomst) ? group[0].uitkomst[0] : group[0].uitkomst;
    const isVso = group.some(g => /vso|vaststellingsovereenkomst/i.test((g.titel||'')+(g.samenvatting||'')));
    if (uit === 'outcome-opgelost' || uit === 'outcome-verkeerd') { s.opgelost++; if (isVso) s.stam++; }
    else if (uit === 'outcome-brandmeester') s.brandmeester++;
    else if (uit === 'outcome-afkoop') s.afkoop++;
    else if (uit === 'outcome-terugbel') s.terugbel++;
    else if (uit === 'outcome-geen-dekking') s.geenDekking++;
    else if (uit === 'outcome-stam') { s.stam++; s.opgelost++; }
  });
  return s;
}
function toggleDet(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';

function updateOKRStrip(dayData, weekTotals, drukte) {
  const bmEl = document.getElementById('okr-brandmeester');
  const scoreEl = document.getElementById('okr-score');
  const drukteEl = document.getElementById('okr-drukte');

  if (weekTotals !== null) {
    const bm = weekTotals.brandmeester || 0;
    const bmMax = 6;
    const bmCls = bm < bmMax ? 'green' : bm === bmMax ? 'orange' : 'red';
    if (bmEl) { bmEl.className = 'okr-pill ' + bmCls; bmEl.textContent = `🎯 Brandmeester: ${bm}/${bmMax}`; }
  }

  if (dayData) {
    const score = dayData.score || 0;
    const scoreCls = score >= 8 ? 'green' : score >= 6.5 ? 'orange' : score > 0 ? 'red' : 'neutral';
    if (scoreEl) { scoreEl.className = 'okr-pill ' + scoreCls; scoreEl.textContent = `⭐ Score: ${score > 0 ? score.toFixed(1)+'/10' : '—'}`; }
  }

  if (drukte) {
    const drukCls = drukte === 'druk' ? 'red' : drukte === 'matig' ? 'orange' : 'green';
    const drukLabel = drukte === 'druk' ? 'Druk' : drukte === 'matig' ? 'Matig' : 'Rustig';
    if (drukteEl) { drukteEl.className = 'okr-pill ' + drukCls; drukteEl.textContent = `📊 Drukte: ${drukLabel}`; }
  }
}

  const bmStatus = bm < bmMax ? '✅ Op schema' : bm === bmMax ? '⚠️ Op de grens' : '🔴 Boven doel';
  return `<div class="okr-week-banner">

function buildConversations(convs, showDagHeader, dagLabel, dagScore) {
  if (!convs || convs.length === 0) return `<div style="padding:16px 20px;color:#9ca3af;font-size:13px;font-weight:300">Geen gesprekken geregistreerd.</div>`;
  let html = "";
  if (showDagHeader) html += `<div class="dag-header"><span>${dagLabel}</span>${dagScore != null ? `<span class="dag-score">⭐ ${dagScore.toFixed(1)}/10</span>` : ""}</div>`;
  const groups = _groupConvsByPerson(convs);
  html += groups.map(group => {
    const isVso = g => /vso|vaststellingsovereenkomst/i.test((g.titel||'') + ' ' + (g.samenvatting||''));
    const _vsoAlreadyHandled = g => { const s = (g.samenvatting||'').toLowerCase(); return s.includes('stam advocaten') || s.includes('extern advocaat') || s.includes('extern arbeidsrecht') || s.includes('advocatenkantoor') || (Array.isArray(g.uitkomst) ? g.uitkomst[0] : g.uitkomst) === 'outcome-stam'; };
    const vsoWarn = g => isVso(g) && !_vsoAlreadyHandled(g)
      ? `<span style="background:#fef9c3;color:#92400e;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600">⚡ VSO → Stam Advocaten aanbieden?</span>` : '';
    if (group.length === 1) {
      const cv = group[0];
      const uit = Array.isArray(cv.uitkomst) ? cv.uitkomst : [cv.uitkomst, cv.uitkomst];
      const detId = 'cd' + Math.random().toString(36).substr(2,7);
      const bullets = (cv.samenvatting||'').split(/(?<=[.;])\s+/).filter(s=>s.trim().length>8).map(s=>`<div>• ${s.trim()}</div>`).join('');
      return `<div class="conv-item">
      <div class="conv-time">${cv.tijd}</div>
      <div>
        <div class="conv-title">${cv.titel}</div>
        <div class="conv-persons">${cv.personen}</div>
        <div class="conv-summary">${cv.samenvatting}</div>
        <div class="conv-footer">
          ${cv.tags.map(([cls,lbl]) => `<span class="tag ${cls}">${lbl}</span>`).join("")}
          <span class="outcome-badge ${uit[0]}" onclick="toggleDet('${detId}')" title="Klik voor redenen">${uit[1]} ▾</span>
          ${vsoWarn(cv)}
        </div>
        <div id="${detId}" class="conv-det">${bullets || cv.samenvatting}</div>
      </div>
    </div>`;
    } else {
      const firstName = (() => { const m = group[0].personen.match(/Verzekerde:\s*([^\xb7]+)/); return m ? m[1].trim() : 'Meerdere gesprekken'; })();
      return `<div class="conv-item" style="border-left:3px solid #1d4ed8;padding-left:10px">
      <div class="conv-time">${group[0].tijd}</div>
      <div style="width:100%">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div class="conv-title">${firstName}</div>
          <span style="background:#1d4ed8;color:#fff;padding:1px 9px;border-radius:9999px;font-size:10px;font-weight:700">${group.length}&times;</span>
        </div>
        ${group.map((cv, i) => {
          const medewerker = cv.personen.split('\xb7')[1]?.trim() || '';
          const uit = Array.isArray(cv.uitkomst) ? cv.uitkomst : [cv.uitkomst, cv.uitkomst];
          return `<div style="border-top:1px solid #f3f4f6;padding:8px 0 4px">
            <div style="font-size:11px;font-weight:600;color:#6b7280;margin-bottom:4px">${i === 0 ? medewerker : 'Vervolg — ' + medewerker} <span style="color:#d1d5db;font-weight:400">${cv.tijd}</span></div>
            <div class="conv-summary">${cv.samenvatting}</div>
            <div class="conv-footer" style="margin-top:4px">
              ${cv.tags.map(([cls,lbl]) => `<span class="tag ${cls}">${lbl}</span>`).join("")}
              <span class="outcome-badge ${uit[0]}">${uit[1]}</span>
              ${vsoWarn(cv)}
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
    }
  }).join("");
  return html;
}

function buildActies(acties) {
  if (!acties || acties.length === 0) return `<div style="padding:16px 20px;color:#9ca3af;font-size:13px;font-weight:300">Geen openstaande actiepunten.</div>`;
  return acties.map((a,i) => `
    <div class="action-item">
      <div class="prio-dot ${a.prio}"></div>
      <div class="check-box" onclick="toggleCheck(this)" id="chk-${i}"></div>
      <div style="flex:1">
        <div class="action-text">${a.tekst}</div>
        <div class="action-meta"><span class="action-owner">👤 ${a.eigenaar}</span><span class="${a.deadline}">⏰ ${a.deadlineTekst}</span></div>
      </div>
    </div>`).join("");
}

// ===================== JARGON FILTER =====================
const _jargonMap = [
  [/routeringsgesprekken?/gi, 'gesprekken die verkeerd binnenkwamen'],
  [/misdirected calls?/gi, 'verkeerd doorverbonden telefoontjes'],
  [/dekkingsspanning/gi, 'onduidelijkheid over wat de polis dekt'],
  [/procesuitzondering/gi, 'uitzondering op het normale proces'],
  [/polisverificatie/gi, 'controle van de polis'],
  [/franchise[-\s]check/gi, 'controle van het eigen risico'],
  [/doorverwijzingsdrempel/gi, 'grens voor doorverwijzen'],
  [/uitloopperiode/gi, 'periode na beëindigen polis'],
  [/synth?ronisatie[-\s]probleem/gi, 'systeem-synchronisatieprobleem'],
];
function _jargonFilter(text) {
  if (!text) return text;
  let out = text;
  _jargonMap.forEach(([pat, rep]) => { out = out.replace(pat, rep); });
  return out;
}

  const wkTotals = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0,stam:0};

function buildWeekAnalyse(keys) {
  const allGoed = [], allBeter = [];
  let scoreSum = 0, scoreDays = 0;
  keys.forEach(k => {
    const d = weekData[k]; if (!d || !d.analyse) return;
    const dag = formatDate(k);
    d.analyse.goed.forEach(t => allGoed.push({ dag, t }));
    d.analyse.beter.forEach(t => allBeter.push({ dag, t }));
    if (d.score > 0) { scoreSum += d.score; scoreDays++; }
  });
  const avgScore = scoreDays > 0 ? (scoreSum/scoreDays).toFixed(1) : null;
  if (allGoed.length === 0 && allBeter.length === 0) return '';
  return `<div class="section">
    <div class="section-header" onclick="toggle(this)">
      <div class="section-icon" style="background:#f3e8ff">📊</div>
      <div class="section-title">Kwaliteitsanalyse — hele week${avgScore ? ` · ⭐ ${avgScore}/10` : ''}</div>
      <span class="chevron">▼</span>
    </div>
    <div class="section-body">
      <div class="analyse-grid" style="padding:18px 20px">
        <div>
          <div class="analyse-col-title goed">✅ Wat ging goed</div>
          ${allGoed.map(({dag,t}) => `<div class="analyse-point goed-point"><div class="analyse-icon">✓</div><div class="analyse-text"><span style="font-size:11px;color:#6b7280;font-weight:500">${dag}:</span> ${_jargonFilter(t)}</div></div>`).join('') || '<div style="color:#9ca3af;font-size:13px">Geen data.</div>'}
        </div>
        <div>
          <div class="analyse-col-title beter">⚠️ Wat kon beter</div>
          ${allBeter.map(({dag,t}) => `<div class="analyse-point beter-point"><div class="analyse-icon">!</div><div class="analyse-text"><span style="font-size:11px;color:#6b7280;font-weight:500">${dag}:</span> ${_jargonFilter(t)}</div></div>`).join('') || '<div style="color:#9ca3af;font-size:13px">Geen data.</div>'}
        </div>
      </div>
    </div>
  </div>`;
}

function buildBrandmeesterRedenen(keys) {
  const redenen = [];
  keys.forEach(k => {
    const d = weekData[k]; if (!d) return;
    const dag = formatDate(k);
    (d.conversations || []).forEach(cv => {
      const uit = Array.isArray(cv.uitkomst) ? cv.uitkomst[0] : cv.uitkomst;
      if (uit === 'outcome-brandmeester' || uit === 'outcome-afkoop') {
        const reden = (cv.samenvatting || cv.titel || '').split(/[.;]/)[0].trim();
        redenen.push({ dag, titel: cv.titel, reden, uit, uitLabel: Array.isArray(cv.uitkomst) ? cv.uitkomst[1] : cv.uitkomst });
      }
    });
  });
  if (redenen.length === 0) return '';
  const brandRedenen = redenen.filter(r => r.uit === 'outcome-brandmeester');
  const afkoopRedenen = redenen.filter(r => r.uit === 'outcome-afkoop');
  return `<div class="section">
    <div class="section-header" onclick="toggle(this)">
      <div class="section-icon" style="background:var(--blue-light-bg)">⚖️</div>
      <div class="section-title">Redenen doorverwijzing — Brandmeester (${brandRedenen.length}) &amp; Afkoop (${afkoopRedenen.length})</div>
      <span class="chevron">▼</span>
    </div>
    <div class="section-body" style="padding:16px 20px">
      ${brandRedenen.length > 0 ? `<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">→ Brandmeester</div>
      ${brandRedenen.map(r => `<div style="display:flex;gap:10px;margin-bottom:9px;font-size:13px"><span style="color:#6b7280;font-size:11px;min-width:90px;flex-shrink:0;padding-top:1px;font-weight:300">${r.dag}</span><span style="color:#374151;font-weight:300">${r.titel}</span></div>`).join('')}` : ''}
      ${afkoopRedenen.length > 0 ? `<div style="font-size:11px;font-weight:700;color:#1a5c8a;text-transform:uppercase;letter-spacing:.5px;margin:${brandRedenen.length>0?'16px':0} 0 10px">🤝 Afkoop</div>
      ${afkoopRedenen.map(r => `<div style="display:flex;gap:10px;margin-bottom:9px;font-size:13px"><span style="color:#6b7280;font-size:11px;min-width:90px;flex-shrink:0;padding-top:1px;font-weight:300">${r.dag}</span><span style="color:#374151;font-weight:300">${r.titel}<br><span style="font-size:12px;color:#9ca3af">${r.reden}</span></span></div>`).join('')}` : ''}
    </div>
  </div>`;
}

function renderWeek(keysOverride, labelOverride) {
  document.getElementById("header-date").textContent = labelOverride || "Weekoverzicht";
  const keys = keysOverride || getWeekKeys();
  const todayKey = dateKey(new Date());
  const totals = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0};
  let totalGesprekken = 0, scoreSum = 0, scoreDays = 0;

  keys.forEach(k => {
    const d = weekData[k];
    const m = getManualStats(k);
    const merged = mergeStats(d?.stats, m.stats);
    const total = (d?.gesprekken || 0) + m.count;
    if (total > 0 || d?.gesprekken > 0) {
      totals.opgelost += merged.opgelost; totals.brandmeester += merged.brandmeester;
      totals.afkoop += merged.afkoop; totals.terugbel += merged.terugbel; totals.geenDekking += merged.geenDekking;
      totalGesprekken += total;
      if (d?.score > 0) { scoreSum += d.score; scoreDays++; }
    }
  });
  const avgScore = scoreDays > 0 ? scoreSum / scoreDays : null;
  const DAGNAMEN = ["Ma","Di","Wo","Do","Vr","Za","Zo"];

  updateOKRStrip(null, totals, null);

  const tableRows = keys.map(k => {
    const d = weekData[k];
    const m = getManualStats(k);
    const merged = mergeStats(d?.stats, m.stats);
    const total = (d?.gesprekken || 0) + m.count;
    const dateObj = new Date(k + "T12:00:00");
    const dagNaam = DAGNAMEN[dateObj.getDay() === 0 ? 6 : dateObj.getDay() - 1];
    const dagNum = `${dateObj.getDate()} ${MONTHS_NL[dateObj.getMonth()]}`;
    const isToday = k === todayKey;
    const manualTag = m.count > 0 ? ` <span style="font-size:10px;color:#6b7280;font-weight:400">(+${m.count}📧)</span>` : '';
    if (total === 0) return `<div class="week-row${isToday?" today":""}"><div class="week-day">${dagNaam}${isToday?" 🔵":""}<div class="date-sub">${dagNum}</div></div><div class="week-empty" style="grid-column:2/8">${d ? "Geen gesprekken" : "Geen data"}</div></div>`;
    const scoreClass = d?.score >= 8 ? "high" : d?.score >= 6.5 ? "mid" : "low";
    return `<div class="week-row${isToday?" today":""}"><div class="week-day">${dagNaam}${isToday?" 🔵":""}${manualTag}<div class="date-sub">${dagNum}</div></div><div class="week-num green">${merged.opgelost}</div><div class="week-num blue">${merged.brandmeester}</div><div class="week-num purple">${merged.afkoop}</div><div class="week-num orange">${merged.terugbel}</div><div class="week-num gray">${merged.geenDekking}</div><div class="week-score ${scoreClass}">${d?.score > 0 ? d.score.toFixed(1) : '—'}</div></div>`;
  }).join("");

  const allConvs = keys.map(k => {
    const d = weekData[k];
    return (!d || !d.conversations || d.conversations.length === 0) ? "" : buildConversations(d.conversations, true, formatDate(k), d.score);
  }).join("");
  const allManualWeek = keys.filter(k => getManualEntries(k).length > 0).map(k => buildManualSection(k)).join("");
  const allActies = keys.flatMap(k => weekData[k]?.acties || []);
  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="drukte-banner" style="background:var(--blue-light-bg);border-color:var(--blue-light)">
      <div class="drukte-icon">📅</div>
      <div><div class="drukte-label" style="color:#1e6091">Week totaal — ${totalGesprekken} gesprekken</div><div class="drukte-sub">${keys.length} dagen · ${scoreDays} dag(en) met data${avgScore !== null ? ` · gem. score ${avgScore.toFixed(1)}/10` : ""}</div></div>
    </div>
    ${buildOKRWeekBanner(totals)}
    <div class="week-table">
      <div class="week-table-header"><div>Dag</div><div style="text-align:center;color:var(--green)">✅ Opgelost</div><div style="text-align:center;color:var(--accent)">⚖️ Brandm.</div><div style="text-align:center;color:#1a5c8a">🤝 Afkoop</div><div style="text-align:center;color:var(--text)">📞 Terug</div><div style="text-align:center;color:var(--text-muted)">🚫 Geen</div><div style="text-align:right">Score</div></div>
      ${tableRows}
      <div class="week-totals"><div>Totaal</div><div style="text-align:center;color:var(--green)">${totals.opgelost}</div><div style="text-align:center;color:#1d4ed8">${totals.brandmeester}</div><div style="text-align:center;color:#7c3aed">${totals.afkoop}</div><div style="text-align:center;color:#c2410c">${totals.terugbel}</div><div style="text-align:center;color:#9ca3af">${totals.geenDekking}</div><div style="text-align:right">${avgScore !== null ? avgScore.toFixed(1) : "—"}</div></div>
    </div>
    ${buildStats(totals)}
    ${buildFilterBanner(keys.flatMap(k => weekData[k]?.conversations||[]), keys.flatMap(k => getManualEntries(k)))}
    <div class="section-controls">
      <button class="section-ctrl-btn" onclick="toggleAllSections(this)">Alles uitklappen</button>
    </div>
    ${buildChart(totals)}
    <div class="section">
      <div class="section-header" onclick="toggle(this)"><div class="section-icon" style="background:var(--blue-light-bg)">💬</div><div class="section-title">Alle gesprekken deze week</div><span class="section-count">${keys.reduce((a,k)=>(weekData[k]?.gesprekken||0)+a,0)}</span><span class="chevron">▼</span></div>
      <div class="section-body">${allConvs || '<div style="padding:16px 20px;color:#9ca3af;font-size:13px">Nog geen gesprekken deze week.</div>'}</div>
    </div>
    ${allManualWeek}
    ${buildWeekAnalyse(keys)}
    ${buildBrandmeesterRedenen(keys)}
    <div class="section">
      <div class="section-header" onclick="toggle(this)"><div class="section-icon" style="background:var(--green-light)">✅</div><div class="section-title">Openstaande actiepunten</div><span class="section-count">${allActies.length}</span><span class="chevron">▼</span></div>
      <div class="section-body">${buildActies(allActies)}</div>
    </div>`;
  _collapseAllSections(app);
  initChart(totals);
}

const MONTHS_NL = ["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];
const DAYS_NL = ["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"];
const DAYS_SHORT = ["Zo","Ma","Di","Wo","Do","Vr","Za"];

function dateKey(d) { return d.toISOString().slice(0,10); }
function formatDate(k) {
  const d = new Date(k + "T12:00:00");
  return DAYS_NL[d.getDay()] + " " + d.getDate() + " " + MONTHS_NL[d.getMonth()] + " " + d.getFullYear();
}
function formatDateShort(k) {
  const d = new Date(k + "T12:00:00");
  return d.getDate() + " " + MONTHS_NL[d.getMonth()];
}

function getWeekKeys(offsetWeeks) {
  offsetWeeks = offsetWeeks || 0;
  const today = new Date(); today.setHours(12,0,0,0);
  const dow = today.getDay() === 0 ? 6 : today.getDay() - 1;
  const monday = new Date(today); monday.setDate(today.getDate() - dow - offsetWeeks * 7);
  const keys = [];
  for (let i=0; i<5; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    keys.push(dateKey(d));
  }
  return keys;
}
function getLastWeekKeys() { return getWeekKeys(7); }

function mergeStats(a, b) {
  const keys = ["opgelost","brandmeester","afkoop","terugbel","geenDekking","stam"];
  const out = {};
  keys.forEach(k => out[k] = (a?.[k] || 0) + (b?.[k] || 0));
  return out;
}

function _jargonFilter(t) {
  return t.replace(/Brandmeester/g, "Jurist")
           .replace(/brandmeester/g, "jurist")
           .replace(/outcome-brandmeester/g, "outcome-jurist");
}

// ======================== MANUAL ENTRIES (GitHub-synced) ========================
let _ghData = {};
let _ghSha = null;
let _ghLoaded = false;
let _ghSaving = false;
let _ghDirty = false;

async function _ghLoad() {
  try {
    const [raw, meta] = await Promise.all([
      fetch(_GH_RAW + '?t=' + Date.now()).then(r => r.ok ? r.json() : {}),
      fetch(_GH_API, { headers: { Authorization: 'Bearer ' + _GH_TOKEN, Accept: 'application/vnd.github+json' } }).then(r => r.json())
    ]);
    _ghData = (raw && typeof raw === 'object' && !Array.isArray(raw)) ? raw : {};
    _ghSha = meta.sha || null;
    _ghLoaded = true;
    _ghDirty = false;
    const now = new Date();
    const hh = now.getHours().toString().padStart(2,'0');
    const mm = now.getMinutes().toString().padStart(2,'0');
    const el = document.getElementById('update-time');
    if (el) el.textContent = hh + ':' + mm;
    setView(currentView);
  } catch(e) {
    _ghLoaded = true;
    setView(currentView);
  }
}

async function _ghSave() {
  if (_ghSaving || !_ghLoaded) return;
  _ghSaving = true;
  try {
    const body = { message: "Update manual entries", content: btoa(unescape(encodeURIComponent(JSON.stringify(_ghData, null, 2)))), sha: _ghSha };
    const r = await fetch(_GH_API, { method: 'PUT', headers: { Authorization: 'Bearer ' + _GH_TOKEN, 'Content-Type': 'application/json', Accept: 'application/vnd.github+json' }, body: JSON.stringify(body) });
    const j = await r.json();
    if (j.content && j.content.sha) _ghSha = j.content.sha;
  } catch(e) {}
  _ghSaving = false;
  if (_ghDirty) { _ghDirty = false; setTimeout(_ghSave, 1500); }
}

function getManualEntries(key) { return Array.isArray(_ghData[key]) ? _ghData[key] : []; }
function getManualStats(key) {
  const entries = getManualEntries(key);
  const stats = { opgelost:0, brandmeester:0, afkoop:0, terugbel:0, geenDekking:0, stam:0 };
  entries.forEach(e => { const k = e.uitkomst; if (stats[k] !== undefined) stats[k]++; });
  return { count: entries.length, stats };
}

function saveManualEntry(key, entry) {
  if (!_ghData[key]) _ghData[key] = [];
  _ghData[key].push(entry);
  _ghDirty = true;
  _ghSave();
  setView(currentView);
}

function deleteManualEntry(key, idx) {
  if (!_ghData[key]) return;
  _ghData[key].splice(idx, 1);
  _ghDirty = true;
  _ghSave();
  setView(currentView);
}

function checkForDuplicate(key, naam, eigenaar) {

// ======================== COMPUTE KPIs ========================
function computeKPIs(dayKey) {
  const d = weekData[dayKey];
  if (!d || !d.conversations || d.conversations.length === 0) return null;

  // Brandmeester van de dag: who solved most (outcome-opgelost)
  const personCounts = {};
  d.conversations.forEach(cv => {
    const uit = Array.isArray(cv.uitkomst) ? cv.uitkomst[0] : cv.uitkomst;
    if (uit === 'outcome-opgelost') {
      // Extract jurist name from personen field (after "·")
      const parts = (cv.personen || '').split('·');
      const name = parts.length > 1 ? parts[parts.length-1].trim().replace(/^Medewerker:\s*/,'') : '';
      if (name && name !== 'Medewerker' && name !== 'n.v.t.') {
        personCounts[name] = (personCounts[name] || 0) + 1;
      }
    }
  });
  let brandmeester = null, brandmeesterCount = 0;
  Object.entries(personCounts).forEach(([name, count]) => {
    if (count > brandmeesterCount) { brandmeester = name; brandmeesterCount = count; }
  });

  // Onderwerpen
  const onderwerpCounts = {};
  d.conversations.forEach(cv => {
    if (cv.tags && cv.tags[0]) {
      const label = cv.tags[0][1] || cv.tags[0][0];
      onderwerpCounts[label] = (onderwerpCounts[label] || 0) + 1;
    }
  });

  // Hourly distribution (for line chart)
  const hourCounts = {};
  d.conversations.forEach(cv => {
    const h = parseInt((cv.tijd||'00:00').split(':')[0]);
    if (!isNaN(h)) hourCounts[h] = (hourCounts[h] || 0) + 1;
  });

  return { brandmeester, brandmeesterCount, onderwerpCounts, hourCounts };
}

function computeWeekKPIs(keys) {
  const personCounts = {};
  const onderwerpCounts = {};
  const hourCounts = {};
  let totalScore = 0, scoreDays = 0;

  keys.forEach(k => {
    const d = weekData[k];
    if (!d || !d.conversations) return;
    d.conversations.forEach(cv => {
      const uit = Array.isArray(cv.uitkomst) ? cv.uitkomst[0] : cv.uitkomst;
      if (uit === 'outcome-opgelost') {
        const parts = (cv.personen || '').split('·');
        const name = parts.length > 1 ? parts[parts.length-1].trim().replace(/^Medewerker:\s*/,'') : '';
        if (name && name !== 'Medewerker' && name !== 'n.v.t.') personCounts[name] = (personCounts[name]||0)+1;
      }
      if (cv.tags && cv.tags[0]) {
        const label = cv.tags[0][1] || cv.tags[0][0];
        onderwerpCounts[label] = (onderwerpCounts[label]||0)+1;
      }
      const h = parseInt((cv.tijd||'00:00').split(':')[0]);
      if (!isNaN(h)) hourCounts[h] = (hourCounts[h]||0)+1;
    });
    if (d.score > 0) { totalScore += d.score; scoreDays++; }
  });

  let brandmeester = null, brandmeesterCount = 0;
  Object.entries(personCounts).forEach(([name, count]) => {
    if (count > brandmeesterCount) { brandmeester = name; brandmeesterCount = count; }
  });

  return { brandmeester, brandmeesterCount, onderwerpCounts, hourCounts, avgScore: scoreDays > 0 ? totalScore/scoreDays : 0 };
}

// ======================== LINE CHART SVG ========================
function buildLineChart(hourCounts, totalGesprekken) {
  const hours = [];
  for (let h=8; h<=18; h++) hours.push(h);
  const maxVal = Math.max(1, ...hours.map(h => hourCounts[h]||0));

  const W = 500, H = 90, PL = 10, PR = 10, PT = 10, PB = 20;
  const chartW = W - PL - PR;
  const chartH = H - PT - PB;

  const points = hours.map((h, i) => {
    const x = PL + (i / (hours.length-1)) * chartW;
    const y = PT + chartH - ((hourCounts[h]||0) / maxVal) * chartH;
    return { x, y, h, v: hourCounts[h]||0 };
  });

  // Path
  const pathD = points.map((p, i) => `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const areaD = pathD + ` L${points[points.length-1].x.toFixed(1)},${(PT+chartH).toFixed(1)} L${PL},${(PT+chartH).toFixed(1)} Z`;

  // X-axis labels
  const xLabels = hours.filter((h,i) => i % 2 === 0).map((h, i) => {
    const idx = hours.indexOf(h);
    const x = PL + (idx / (hours.length-1)) * chartW;
    return `<text x="${x.toFixed(1)}" y="${H-3}" text-anchor="middle" font-size="9" fill="#9ca3af">${h}u</text>`;
  }).join('');

  // Dots for active hours
  const dots = points.filter(p => p.v > 0).map(p =>
    `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="#AE986F" stroke="white" stroke-width="1.5"/>`
  ).join('');

  return `<svg class="line-chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="height:100px">
  <defs>
    <linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AE986F" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#AE986F" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <path d="${areaD}" fill="url(#area-grad)" stroke="none"/>
  <path d="${pathD}" fill="none" stroke="#AE986F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  ${dots}
  ${xLabels}
</svg>`;
}

function getPiekTijd(dayKey) {
  const d = weekData[dayKey];
  if (!d || !d.conversations || d.conversations.length === 0) return '—';
  const hourCounts = {};
  d.conversations.forEach(cv => {
    const h = parseInt((cv.tijd||'00:00').split(':')[0]);
    if (!isNaN(h)) hourCounts[h] = (hourCounts[h]||0)+1;
  });
  let maxH = null, maxV = 0;
  Object.entries(hourCounts).forEach(([h,v]) => { if (v>maxV) { maxH=h; maxV=v; } });
  return maxH !== null ? maxH + ':00' : '—';
}

function buildTeamTable(keys) {
  // Aggregate per jurist
  const juristen = {};
  keys.forEach(k => {
    const d = weekData[k];
    if (!d || !d.conversations) return;
    d.conversations.forEach(cv => {
      const parts = (cv.personen||'').split('·');
      const rawName = parts.length > 1 ? parts[parts.length-1].trim().replace(/^Medewerker:\s*/,'') : '';
      const name = rawName && rawName !== 'Medewerker' && rawName !== 'n.v.t.' ? rawName : null;
      if (!name) return;
      if (!juristen[name]) juristen[name] = { gesprekken: 0, opgelost: 0, scores: [] };
      juristen[name].gesprekken++;
      const uit = Array.isArray(cv.uitkomst) ? cv.uitkomst[0] : cv.uitkomst;
      if (uit === 'outcome-opgelost') juristen[name].opgelost++;
      if (weekData[k]?.score > 0) juristen[name].scores.push(weekData[k].score);
    });
  });

  const sorted = Object.entries(juristen).sort((a,b) => b[1].gesprekken - a[1].gesprekken);
  if (sorted.length === 0) return '';

  const maxGesp = sorted[0][1].gesprekken;

  const rows = sorted.map(([name, data]) => {
    const avgScore = data.scores.length > 0 ? (data.scores.reduce((a,b)=>a+b,0)/data.scores.length) : 0;
    const scoreColor = avgScore >= 7.5 ? '#166534' : avgScore >= 6.5 ? '#92400e' : '#6b7280';
    const initials = getInitials(name);
    const bgColor = getAvatarColor(name);
    const barW = maxGesp > 0 ? Math.round(data.gesprekken/maxGesp*100) : 0;
    return `<div class="team-table-row">
      <div class="team-person">
        <div class="team-avatar" style="background:${bgColor}">${initials}</div>
        <div><div class="team-name">${name}</div><div class="team-role">Jurist</div></div>
      </div>
      <div class="team-count-cell">
        <div class="team-count-num">${data.gesprekken}</div>
        <div class="team-count-bar-wrap"><div class="team-count-bar" style="width:${barW}%"></div></div>
      </div>
      <div class="team-score" style="color:${scoreColor}">${avgScore > 0 ? avgScore.toFixed(1) : '—'}</div>
      <div class="team-duur">${data.opgelost} opgelost</div>
      <div style="text-align:center"><div class="team-status-dot" style="background:${data.gesprekken>0?'#4ade80':'#d1d5db'}"></div></div>
    </div>`;
  }).join('');

  return `<div class="team-table-card">
    <div style="padding:16px 20px;border-bottom:1px solid var(--card-border);font-size:10px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-muted)">Team</div>

  </div>`;
}

function showManualForm(key) {
  document.getElementById('manual-form-'+key).classList.remove('hidden');
}
function hideManualForm(key) {
  document.getElementById('manual-form-'+key).classList.add('hidden');
}
function submitManualForm(key) {
  const naam = document.getElementById('mf-naam-'+key).value.trim();
  const eigenaar = document.getElementById('mf-eigenaar-'+key).value.trim();
  const titel = document.getElementById('mf-titel-'+key).value.trim();
  const samen = document.getElementById('mf-samen-'+key).value.trim();
  const uit = document.getElementById('mf-uit-'+key).value;
  const tijd = document.getElementById('mf-tijd-'+key).value;
  if (!titel && !naam) return;
  const uitLabel = MANUAL_OUTCOMES.find(o=>o[0]===uit)?.[1] || uit;
  const entry = { naam, eigenaar, titel, samenvatting:samen, uitkomst:uit.replace('outcome-',''), uitkomstLabel:uitLabel, tijd };
  const dupIdx = checkForDuplicate(key, naam, eigenaar);
  if (dupIdx >= 0 && naam) showMergeModal(key, entry, dupIdx);
  else saveManualEntry(key, entry);
}

// ======================== WEEK TABLE ========================
function buildWeekTable(keys) {
  const todayKey = dateKey(new Date());
  const DAYS = ["Ma","Di","Wo","Do","Vr"];

  const totals = { opgelost:0, brandmeester:0, afkoop:0, terugbel:0, geenDekking:0 };
  let totalGesp = 0;

  const rows = keys.map((k, i) => {
    const d = weekData[k];
    const m = getManualStats(k);
    const merged = mergeStats(d?.stats, m.stats);
    const gesp = (d?.gesprekken||0) + m.count;
    const isToday = k === todayKey;

    Object.keys(totals).forEach(key => totals[key] = (totals[key]||0) + (merged[key]||0));
    totalGesp += gesp;

    const d2 = new Date(k + "T12:00:00");
    const dayName = DAYS[i] || DAYS[d2.getDay()-1] || '?';
    const dayNum = formatDateShort(k);

    if (gesp === 0) return `<div class="week-tr${isToday?' today':''}">
      <div><div class="week-day-name">${dayName}${isToday?' 🔵':''}</div><div class="week-day-sub">${dayNum}</div></div>
      <div class="week-num" style="color:var(--text-muted);font-size:12px;grid-column:2/7">Geen gesprekken</div>
      <div class="week-score-cell">—</div>
    </div>`;

    const scoreClass = d?.score >= 8 ? 'score-high' : d?.score >= 6.5 ? 'score-mid' : 'score-low';
    return `<div class="week-tr${isToday?' today':''}" onclick="setView('vandaag')">
      <div><div class="week-day-name">${dayName}${isToday?' 🔵':''}</div><div class="week-day-sub">${dayNum}</div></div>
      <div class="week-num" style="color:var(--green)">${merged.opgelost}</div>
      <div class="week-num" style="color:#1d4ed8">${merged.brandmeester}</div>
      <div class="week-num" style="color:#7c3aed">${merged.afkoop}</div>
      <div class="week-num" style="color:#c2410c">${merged.terugbel}</div>
      <div class="week-num" style="color:#9ca3af">${merged.geenDekking}</div>
      <div class="week-score-cell ${scoreClass}">${d?.score > 0 ? d.score.toFixed(1) : '—'}</div>
    </div>`;
  }).join('');

  return `<div class="week-table-card">
    <div class="week-th">
      <span>Dag</span>
      <span style="text-align:center;color:var(--green)">Opgelost</span>
      <span style="text-align:center;color:#1d4ed8">Doorv.</span>
      <span style="text-align:center;color:#7c3aed">Afkoop</span>
      <span style="text-align:center;color:#c2410c">Terug</span>
      <span style="text-align:center;color:#9ca3af">Geen</span>
      <span style="text-align:right">Score</span>
    </div>
    ${rows}
    <div class="week-tf">
      <span>Totaal</span>
      <span style="text-align:center;color:var(--green)">${totals.opgelost}</span>
      <span style="text-align:center;color:#1d4ed8">${totals.brandmeester}</span>
      <span style="text-align:center;color:#7c3aed">${totals.afkoop}</span>
      <span style="text-align:center;color:#c2410c">${totals.terugbel}</span>
      <span style="text-align:center;color:#9ca3af">${totals.geenDekking}</span>
      <span style="text-align:right">—</span>
    </div>
  </div>`;
}

// ======================== RENDER FUNCTIONS ========================
function renderDay(key, label) {
  const d = weekData[key];
  const m = getManualStats(key);
  const merged = mergeStats(d?.stats, m.stats);
  const kpis = computeKPIs(key);
  const totalGesp = (d?.gesprekken||0) + m.count;

  document.getElementById('header-date').textContent = label;

  const app = document.getElementById('app');
  app.innerHTML = `
    ${buildKpiHero(key, merged, kpis, d?.drukte || 'rustig')}
    ${buildStatStrip(merged, d?.gesprekken||0, m.count)}
    ${buildChartsRow(kpis, key)}
    ${buildRecenteGesprekken(d?.conversations, 10)}
    ${buildTeamTable([key])}
    <div class="section-card">
      <div class="section-card-header" onclick="toggleSection(this)">
        <div class="section-card-title">💬 Alle gesprekken</div>
        <span class="section-card-count">${d?.gesprekken||0}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">${buildConversations(d?.conversations)}</div>
    </div>
    ${buildManualSection(key)}
    <div class="section-card">
      <div class="section-card-header" onclick="toggleSection(this)">
        <div class="section-card-title">✅ Actiepunten</div>
        <span class="section-card-count">${d?.acties?.length||0}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">${buildActies(d?.acties)}</div>
    </div>
    <div class="section-card">
      <div class="section-card-header" onclick="toggleSection(this)">
        <div class="section-card-title">📊 Kwaliteitsanalyse</div>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">${buildAnalyse(d?.analyse, d?.score)}</div>
    </div>
    ${buildFooter()}
  `;
  _collapseAllExceptFirst(app);
}

function renderWeek(keysOverride, label) {
  const keys = keysOverride || getWeekKeys();
  const labelStr = label || 'Deze week';
  document.getElementById('header-date').textContent = labelStr;

  const totals = { opgelost:0, brandmeester:0, afkoop:0, terugbel:0, geenDekking:0 };
  let totalGesp = 0, scoreSum = 0, scoreDays = 0;
  keys.forEach(k => {
    const d = weekData[k]; const m = getManualStats(k);
    const merged = mergeStats(d?.stats, m.stats);
    const gesp = (d?.gesprekken||0)+m.count;
    Object.keys(totals).forEach(key => totals[key] = (totals[key]||0)+(merged[key]||0));
    totalGesp += gesp;
    if (d?.score > 0) { scoreSum += d.score; scoreDays++; }
  });
  const avgScore = scoreDays > 0 ? scoreSum/scoreDays : 0;
  const kpis = computeWeekKPIs(keys);

  const allConvs = keys.flatMap(k => {
    const d = weekData[k];
    return d?.conversations?.length > 0 ? [{key: k, convs: d.conversations, score: d.score}] : [];
  });

  const allActies = keys.flatMap(k => weekData[k]?.acties||[]);
  const allAnalyse = buildWeekAnalyseBlock(keys);

  const app = document.getElementById('app');
  app.innerHTML = `
    ${buildKpiHeroWeek(keys, totals, avgScore, kpis)}
    ${buildStatStrip(totals, totalGesp, 0)}
    ${buildChartsRow(kpis, keys)}
    ${buildWeekTable(keys)}
    ${buildTeamTable(keys)}
    <div class="section-card">
      <div class="section-card-header" onclick="toggleSection(this)">
        <div class="section-card-title">💬 Alle gesprekken</div>
        <span class="section-card-count">${keys.reduce((a,k)=>(weekData[k]?.gesprekken||0)+a,0)}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        ${allConvs.length > 0
          ? allConvs.map(({key, convs, score}) => buildConversations(convs, true, formatDate(key), score)).join('')
          : '<div class="empty-state">Geen gesprekken deze week.</div>'}
      </div>
    </div>
    <div class="section-card">
      <div class="section-card-header" onclick="toggleSection(this)">
        <div class="section-card-title">✅ Openstaande acties</div>
        <span class="section-card-count">${allActies.length}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">${buildActies(allActies)}</div>
    </div>
    ${allAnalyse}
    ${buildFooter()}
  `;
  _collapseAllExceptFirst(app);
}

function buildWeekAnalyseBlock(keys) {
  const allGoed = [], allBeter = [];
  keys.forEach(k => {
    const d = weekData[k]; if (!d?.analyse) return;
    const dag = formatDate(k);
    d.analyse.goed.forEach(t => allGoed.push({dag, t}));
    d.analyse.beter.forEach(t => allBeter.push({dag, t}));
  });
  if (allGoed.length === 0 && allBeter.length === 0) return '';
  return `<div class="section-card">
    <div class="section-card-header" onclick="toggleSection(this)">
      <div class="section-card-title">📊 Kwaliteitsanalyse — week</div>
      <span class="chevron">▼</span>
    </div>
    <div class="section-body">
      <div class="analyse-grid">
        <div>
          <div class="analyse-col-title goed">✅ Wat ging goed</div>
          ${allGoed.map(({dag,t}) => `<div class="analyse-point goed-point"><div style="flex-shrink:0;color:var(--green)">✓</div><div style="font-size:12px;color:#374151"><span style="font-size:11px;color:#6b7280;font-weight:500">${dag}:</span> ${t}</div></div>`).join('')}
        </div>
        <div>
          <div class="analyse-col-title beter">⚠️ Wat kon beter</div>
          ${allBeter.map(({dag,t}) => `<div class="analyse-point beter-point"><div style="flex-shrink:0;color:var(--gold-dark)">!</div><div style="font-size:12px;color:#374151"><span style="font-size:11px;color:#6b7280;font-weight:500">${dag}:</span> ${t}</div></div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function renderTeam() {
  document.getElementById('header-date').textContent = 'Team overzicht';
  const todayKey = dateKey(new Date());
  const yearStr = new Date().getFullYear().toString();
  const monthStr = new Date().toISOString().slice(0,7);
  const weekKeys = getWeekKeys();

  let weekStats = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0};
  let weekGesp = 0, weekScore = 0, weekScoreDays = 0;
  let monthStats = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0};
  let monthGesp = 0;
  let yearStats = {opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0};
  let yearGesp = 0, yearAfkoop = 0;

  Object.entries(weekData).forEach(([k,d]) => {
    if (!d?.stats) return;
    const s = d.stats; const g = d.gesprekken||0;
    if (k.startsWith(yearStr)) {
      Object.keys(yearStats).forEach(key => yearStats[key] = (yearStats[key]||0)+(s[key]||0));
      yearGesp += g;
      (d.conversations||[]).forEach(cv => {
        const uit = Array.isArray(cv.uitkomst)?cv.uitkomst[0]:cv.uitkomst;
        if (uit==='outcome-afkoop') { const mm=(cv.samenvatting||'').match(/€\s*([\d.,]+)/); if(mm){const amt=parseFloat(mm[1].replace(',','.')); if(!isNaN(amt)&&amt<10000) yearAfkoop+=amt;} }
      });
    }
    if (k.startsWith(monthStr)) { Object.keys(monthStats).forEach(key => monthStats[key]=(monthStats[key]||0)+(s[key]||0)); monthGesp+=g; }
    if (weekKeys.includes(k)) { Object.keys(weekStats).forEach(key=>weekStats[key]=(weekStats[key]||0)+(s[key]||0)); weekGesp+=g; if(d.score>0){weekScore+=d.score;weekScoreDays++;} }
  });

  const avgWeekScore = weekScoreDays > 0 ? (weekScore/weekScoreDays).toFixed(1) : '—';
  const budgetPct = Math.min(100, Math.round(yearAfkoop/40000*100));
  const budgetColor = budgetPct < 50 ? 'var(--green)' : budgetPct < 80 ? '#c2410c' : '#b91c1c';
  const opgelostPct = yearGesp > 0 ? Math.round(yearStats.opgelost/yearGesp*100) : 0;
  const brandPct = yearGesp > 0 ? Math.round(yearStats.brandmeester/yearGesp*100) : 0;
  const allKeys = Object.keys(weekData);

  const app = document.getElementById('app');
  app.innerHTML = `
    <div style="background:#fef9c3;border:1.5px solid #fde68a;border-radius:16px;padding:12px 18px;margin-bottom:16px;font-size:12px;color:#92400e;display:flex;gap:10px;align-items:flex-start">
      <span style="font-size:15px;flex-shrink:0">⚠️</span>
      <span><strong>Let op:</strong> tickets worden nog niet automatisch opgehaald uit Zoho Desk. Data is gebaseerd op Granola-gesprekken en handmatig toegevoegde tickets.</span>
    </div>
    <div class="kpi-hero-row">
      <div class="kpi-hero-card dark">
        <div class="brandmeester-gold-bar"></div>
        <div class="kpi-hero-label">Deze week</div>
        <div class="brandmeester-name">${weekGesp}</div>
        <div class="brandmeester-count">gesprekken afgehandeld</div>
      </div>
      <div class="kpi-hero-card light">
        <div class="kpi-hero-label">Gem. score deze week</div>
        <div><span class="score-big">${avgWeekScore}</span>${weekScoreDays>0?'<span class="score-denom">/10</span>':''}</div>
        <div class="score-stars" style="color:var(--gold)">${parseFloat(avgWeekScore)>0?starsHTML(parseFloat(avgWeekScore)):'<span style="color:#d1d5db">☆☆☆☆☆</span>'}</div>
      </div>
      <div class="kpi-hero-card light">
        <div class="kpi-hero-label">Afkoopbudget ${yearStr}</div>
        <div><span class="score-big" style="color:${budgetColor}">€${Math.round(yearAfkoop).toLocaleString('nl-NL')}</span></div>
        <div class="drukte-bar-wrap" style="margin-top:10px">
          <div class="drukte-bar" style="width:${budgetPct}%;background:${budgetColor}"></div>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:6px">${budgetPct}% van €40.000 jaarbudget</div>
      </div>
    </div>
    ${buildStatStrip(weekStats, weekGesp, 0)}
    ${buildTeamTable(allKeys)}
    <div style="background:var(--white);border:1px solid var(--card-border);border-radius:var(--radius-card);padding:22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.04)">
      <div style="font-size:10px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px">Heel jaar ${yearStr} — ${yearGesp} gesprekken</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div>
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:var(--green);font-weight:600">✅ Opgelost</span><span style="font-weight:700">${yearStats.opgelost} (${opgelostPct}%)</span></div>
          <div style="background:var(--bg);border-radius:999px;height:6px;overflow:hidden"><div style="height:6px;background:var(--green);width:${opgelostPct}%;border-radius:999px"></div></div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#1d4ed8;font-weight:600">⚖ Doorverwezen Brandmeester</span><span style="font-weight:700">${yearStats.brandmeester} (${brandPct}%)</span></div>
          <div style="background:var(--bg);border-radius:999px;height:6px;overflow:hidden"><div style="height:6px;background:#1d4ed8;width:${brandPct}%;border-radius:999px"></div></div>
        </div>
        <div style="display:flex;gap:20px;flex-wrap:wrap">
          <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:#7c3aed">${yearStats.afkoop}</div><div style="font-size:11px;color:var(--text-muted)">Afkoop</div></div>
          <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:#c2410c">${yearStats.terugbel}</div><div style="font-size:11px;color:var(--text-muted)">Terugbellen</div></div>
          <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:#9ca3af">${yearStats.geenDekking}</div><div style="font-size:11px;color:var(--text-muted)">Geen dekking</div></div>
        </div>
      </div>
    </div>
    ${buildFooter()}
  `;
}

function buildFooter() {
  return `<div class="dashboard-footer">
    <div class="footer-logo">HTJZ</div>
    <div class="footer-right">Dagrapport gegenereerd voor Lancyr</div>
  </div>`;
}

// ======================== SECTION TOGGLE ========================
function toggleSection(header) {
  const body = header.nextElementSibling;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : '';
  header.parentElement.classList.toggle('collapsed', isOpen);
}

function _collapseAllExceptFirst(container) {
  let first = true;
  (container || document).querySelectorAll('.section-card').forEach(s => {
    const body = s.querySelector('.section-body');
    if (body) {
      if (first) { body.style.display = ''; s.classList.remove('collapsed'); first = false; }
      else { body.style.display = 'none'; s.classList.add('collapsed'); }
    }
  });
}

function toggleCheck(el) {
  el.classList.toggle('done');
  el.textContent = el.classList.contains('done') ? '✓' : '';
  const txt = el.closest('.actie-item')?.querySelector('.actie-tekst');
  if (txt) txt.style.textDecoration = el.classList.contains('done') ? 'line-through' : '';
}

// ======================== NAV ========================
let currentView = 'vandaag';

function setView(v) {
  if (v !== currentView) activeFilter = null;
  currentView = v;
  ['vandaag','gisteren','week','vorige-week','team'].forEach(x => {
    const el = document.getElementById('btn-'+x);
    if (el) el.classList.toggle('active', x===v);
  });
  const today = new Date(); today.setHours(12,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  if (v==='vandaag') renderDay(dateKey(today), 'Vandaag — ' + formatDate(dateKey(today)));
  else if (v==='gisteren') renderDay(dateKey(yesterday), 'Gisteren — ' + formatDate(dateKey(yesterday)));
  else if (v==='vorige-week') renderWeek(getWeekKeys(7), 'Vorige week');
  else if (v==='team') renderTeam();
  else renderWeek();
}

let activeFilter = null;

function refresh() { _ghLoad(); }
setInterval(() => _ghLoad(), 3 * 60 * 1000);
_ghLoad();
setView('vandaag');
</script>
