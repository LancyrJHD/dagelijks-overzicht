.topbar-divider {

.topbar-opdracht {

}

}

.refresh-btn {

.team-table tbody tr:last-child { border-bottom: none; }

.team-table td {

.team-person {

function dateKey(d) { return d.toISOString().slice(0,10); }
function formatDate(k) {
  const d = new Date(k + "T12:00:00");

function formatDateShort(k) {

function getWeekKeys(offsetWeeks) {
  offsetWeeks = offsetWeeks || 0;
  const today = new Date(); today.setHours(12,0,0,0);
  const dow = today.getDay() === 0 ? 6 : today.getDay() - 1;
  const monday = new Date(today); monday.setDate(today.getDate() - dow - offsetWeeks * 7);
  const keys = [];
  for (let i=0; i<5; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    keys.push(dateKey(d));
  }
  return keys;
}
function getLastWeekKeys() { return getWeekKeys(7); }

    const existing = _ghData[_pendingKey][_pendingMergeIdx];
    existing.samenvatting = (existing.samenvatting ? existing.samenvatting + '\n' : '') + (_pendingEntry.samenvatting || '');
    _ghDirty = true; _ghSave(); setView(currentView);
  }
  closeMergeModal();
}
function confirmSeparate() {
  if (_pendingEntry && _pendingKey) saveManualEntry(_pendingKey, _pendingEntry);
  closeMergeModal();
}


// ======================== HELPERS ========================

function pad(n) { return String(n).padStart(2,'0'); }

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function dateKey(d) {
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function getMonday(d) {
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  return mon;
}

function prevWorkingDay(dateStr) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() - 1);
  while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
  return dateKey(d);
}

function formatDateNL(dateStr) {
  const [y,m,day] = dateStr.split('-');
  const months = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  const days = ['zo','ma','di','wo','do','vr','za'];
  const d = new Date(dateStr);
  return `${days[d.getDay()]} ${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

function formatWeekRange(start, end) {
  const [sy,sm,sd] = start.split('-');
  const [ey,em,ed] = end.split('-');
  const months = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  return `${parseInt(sd)} ${months[parseInt(sm)-1]} – ${parseInt(ed)} ${months[parseInt(em)-1]} ${ey}`;
}

function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return parts.map(p => p[0]).slice(0,2).join('').toUpperCase();
}

function druktePct(d) {
  const map = { rustig:25, matig:40, normaal:55, gemiddeld:55, druk:78, 'heel druk':95 };
  return map[d] || 50;
}

function druktePiek(conversations) {
  if (!conversations || conversations.length === 0) return null;
  const hours = {};
  conversations.forEach(c => {
    const h = c.tijd ? c.tijd.split(':')[0] : null;
    if (h) hours[h] = (hours[h]||0) + 1;
  });
  let maxH = null, maxC = 0;
  for (const [h, count] of Object.entries(hours)) {
    if (count > maxC) { maxC = count; maxH = h; }
  }
  return maxH ? `${maxH}:00` : null;
}

function juristFromPersoon(personen) {
  if (!personen) return null;
  const parts = personen.split('·');
  if (parts.length < 2) return null;
  let j = parts[1].trim();
  // remove "Medewerker:" prefix
  j = j.replace(/^Medewerker:\s*/i, '').replace(/^n\.v\.t\.?$/i, '').trim();
  if (!j || j.toLowerCase() === 'medewerker') return null;
  return j;
}

function getJuristCounts(conversations) {
  const counts = {};
  if (!conversations) return counts;
  conversations.forEach(c => {
    const j = juristFromPersoon(c.personen);
    if (j) counts[j] = (counts[j]||0) + 1;
  });
  return counts;
}

function getBrandmeester(conversations) {
  const counts = getJuristCounts(conversations);
  let best = null, bestCount = 0;
  for (const [name, cnt] of Object.entries(counts)) {
    if (cnt > bestCount) { bestCount = cnt; best = name; }
  }
  return { name: best, count: bestCount };
}

function getTopicCounts(conversations) {
  const counts = {};
  if (!conversations) return counts;
  conversations.forEach(c => {
    if (c.tags && c.tags.length > 0) {
      const label = c.tags[0][1] || c.tags[0][0];
      counts[label] = (counts[label]||0) + 1;
    }
  });
  return counts;
}

function getUitkomstCounts(conversations) {
  const counts = {};
  if (!conversations) return counts;
  conversations.forEach(c => {
    if (c.uitkomst && c.uitkomst.length >= 2) {
      const key = c.uitkomst[0];
      const label = c.uitkomst[1];
      if (!counts[key]) counts[key] = { label, count: 0 };
      counts[key].count++;
    }
  });
  return counts;
}

function getHourCounts(conversations) {
  const counts = {};
  if (!conversations) return counts;
  conversations.forEach(c => {
    const h = c.tijd ? parseInt(c.tijd.split(':')[0]) : null;
    if (h !== null && !isNaN(h)) counts[h] = (counts[h]||0) + 1;
  });
  return counts;
}

// ======================== PERIOD DATA ========================

function getPeriodData(period) {
  const today = todayKey();
  const now = new Date();

  if (period === 'vandaag') {
    const d = weekData[today] || { drukte:'rustig', gesprekken:0, stats:{opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0}, score:0, conversations:[], acties:[] };
    return { keys:[today], entries:[{ key:today, data:d }], label: formatDateNL(today), range: null };
  }

  if (period === 'gisteren') {
    const yKey = prevWorkingDay(today);
    const d = weekData[yKey] || { drukte:'rustig', gesprekken:0, stats:{opgelost:0,brandmeester:0,afkoop:0,terugbel:0,geenDekking:0}, score:0, conversations:[], acties:[] };
    return { keys:[yKey], entries:[{ key:yKey, data:d }], label: formatDateNL(yKey), range: null };
  }

  if (period === 'deze-week') {
    const mon = getMonday(now);
    const keys = [];
    const entries = [];
    for (let i = 0; i < 5; i++) {
      const d = new Date(mon);
      d.setDate(mon.getDate() + i);
      if (d > now) break;
      const k = dateKey(d);
      if (weekData[k]) { keys.push(k); entries.push({ key:k, data:weekData[k] }); }
    }
    const endKey = keys[keys.length-1] || dateKey(mon);
    const startKey = dateKey(mon);
    return { keys, entries, label: 'Deze week', range: formatWeekRange(startKey, endKey) };
  }

  if (period === 'vorige-week') {
    const mon = getMonday(now);
    const prevMon = new Date(mon);
    prevMon.setDate(mon.getDate() - 7);
    const keys = [];
    const entries = [];
    for (let i = 0; i < 5; i++) {
      const d = new Date(prevMon);
      d.setDate(prevMon.getDate() + i);
      const k = dateKey(d);
      if (weekData[k]) { keys.push(k); entries.push({ key:k, data:weekData[k] }); }
    }
    const endKey = keys[keys.length-1] || dateKey(prevMon);
    const startKey = dateKey(prevMon);
    return { keys, entries, label: 'Vorige week', range: formatWeekRange(startKey, endKey) };
  }

  return { keys:[], entries:[], label:'', range:null };
}

function aggregateEntries(entries) {
  let totalGesprekken = 0, totalOpgelost = 0, totalBrandmeester = 0;
  let totalTerugbel = 0, totalGeenDekking = 0, totalAfkoop = 0;
  let allConversations = [];
  let scores = [];
  let druktes = [];

  entries.forEach(({ data }) => {
    totalGesprekken += (data.gesprekken || 0);
    if (data.stats) {
      totalOpgelost += (data.stats.opgelost || 0);
      totalBrandmeester += (data.stats.brandmeester || 0);
      totalTerugbel += (data.stats.terugbel || 0);
      totalGeenDekking += (data.stats.geenDekking || 0);
      totalAfkoop += (data.stats.afkoop || 0);
    }
    if (data.conversations) allConversations = allConversations.concat(data.conversations);
    if (data.score && data.score > 0) scores.push(data.score);
    if (data.drukte) druktes.push(data.drukte);
  });

  const avgScore = scores.length > 0 ? scores.reduce((a,b)=>a+b,0)/scores.length : 0;
  const drukte = druktes.length > 0 ? druktes[Math.floor(druktes.length/2)] : 'rustig';

  return { totalGesprekken, totalOpgelost, totalBrandmeester, totalTerugbel, totalGeenDekking, totalAfkoop, allConversations, avgScore, drukte };
}

// ======================== SVG LINE CHART ========================

function buildLineChart(entries, period) {
  const W = 560, H = 160;
  const padL = 36, padR = 16, padT = 16, padB = 32;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  let labels = [];
  let values = [];

  if (period === 'vandaag' || period === 'gisteren') {
    // Group by hour (8–18)
    const hourCounts = {};
    entries.forEach(({ data }) => {
      if (data.conversations) {
        data.conversations.forEach(c => {
          const h = c.tijd ? parseInt(c.tijd.split(':')[0]) : null;
          if (h !== null && !isNaN(h)) hourCounts[h] = (hourCounts[h]||0) + 1;
        });
      }
    });
    for (let h = 8; h <= 18; h++) {
      labels.push(h + ':00');
      values.push(hourCounts[h] || 0);
    }
  } else {
    // Group by day
    const DAY_NAMES = ['zo','ma','di','wo','do','vr','za'];
    entries.forEach(({ key, data }) => {
      const d = new Date(key);
      labels.push(DAY_NAMES[d.getDay()]);
      values.push(data.gesprekken || 0);
    });
    if (labels.length === 0) { labels = ['ma','di','wo','do','vr']; values = [0,0,0,0,0]; }
  }

  const maxVal = Math.max(...values, 1);
  const n = values.length;

  const xPos = (i) => padL + (i / (n-1 || 1)) * chartW;
  const yPos = (v) => padT + chartH - (v / maxVal) * chartH;

  // Build path
  const pts = values.map((v,i) => [xPos(i), yPos(v)]);
  const lineD = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const areaD = lineD + ` L${pts[pts.length-1][0].toFixed(1)},${(padT+chartH).toFixed(1)} L${pts[0][0].toFixed(1)},${(padT+chartH).toFixed(1)} Z`;

  // Grid lines
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(f => {
    const y = padT + chartH * (1-f);
    const val = Math.round(maxVal * f);
    return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#EDEFF2" stroke-width="1"/>
            <text x="${padL-4}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="9" fill="rgba(13,31,46,0.3)" font-family="Poppins">${val}</text>`;
  }).join('');

  // X axis labels
  const step = n <= 12 ? 1 : Math.ceil(n/8);
  const xLabels = labels.map((l,i) => {
    if (i % step !== 0 && i !== n-1) return '';
    return `<text x="${xPos(i).toFixed(1)}" y="${(padT+chartH+16).toFixed(1)}" text-anchor="middle" font-size="9" fill="rgba(13,31,46,0.4)" font-family="Poppins">${l}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:180px">
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#AE986F" stop-opacity="0.20"/>
        <stop offset="100%" stop-color="#AE986F" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    ${gridLines}
    <path d="${areaD}" fill="url(#areaGrad)"/>
    <path d="${lineD}" fill="none" stroke="#AE986F" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map((p,i) => values[i] > 0 ? `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="#AE986F"/>` : '').join('')}
    ${xLabels}
  </svg>`;
}

// ======================== RENDER ========================

function uitkomstClass(uitkomstKey) {
  if (!uitkomstKey) return 'overig';
  if (uitkomstKey.includes('opgelost')) return 'opgelost';
  if (uitkomstKey.includes('terugbel')) return 'terugbel';
  if (uitkomstKey.includes('brandmeester') || uitkomstKey.includes('stam')) return 'brandmeester';
  if (uitkomstKey.includes('geen-dekking') || uitkomstKey.includes('geenDekking')) return 'geen-dekking';
  return 'overig';
}

function convertLiveToday(live) {

  const uitkomstMap = {

    'terugbellen':          ['outcome-terugbel',     'Terugbellen'],
    'geen-dekking':         ['outcome-geendekking',  'Geen dekking'],

  };
  const conversations = entries.map(e => ({
    tijd:         e.tijdstip,
    titel:        e.titel || e.naam || '—',
    personen:     'Verzekerde: anoniem · ' + (e.medewerker || 'Jackie Stam'),
    samenvatting: e.notitie || '',
    tags:         [],
    uitkomst:     uitkomstMap[e.uitkomst] || ['outcome-opgelost', 'Telefonisch opgelost'],
  }));
  const opgelost     = entries.filter(e => e.uitkomst === 'telefonisch-opgelost').length;
  const terugbel     = entries.filter(e => e.uitkomst === 'terugbellen').length;
  const geenDekking  = entries.filter(e => e.uitkomst === 'geen-dekking').length;
  const brandmeester = entries.filter(e => e.uitkomst === 'doorverbonden').length;
  const total        = entries.length;
  let drukte = 'rustig';
  if (total >= 10) drukte = 'druk';
  else if (total >= 6) drukte = 'normaal';
  else if (total >= 3) drukte = 'matig';
  return {
    drukte, gesprekken: total,
    stats: { opgelost, brandmeester, afkoop: 0, terugbel, geenDekking },
    score: 0, conversations, acties: [], analyse: { goed: [], beter: [] },
  };
}

async function loadLiveToday() {
  try {
    const resp = await fetch('data/today.json?t=' + Date.now());
    if (!resp.ok) return;
    const live = await resp.json();
    const todayStr = new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD
    if (live.date === todayStr && Array.isArray(live.entries) && live.entries.length > 0) {
      weekData[todayStr] = convertLiveToday(live);
      console.log('[LiveData] Geladen: ' + live.entries.length + ' gesprekken van ' + todayStr);
    }
  } catch (e) {
    console.log('[LiveData] Niet beschikbaar, val terug op weekData');
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  setTime();
  setInterval(setTime, 60000);

  await loadLiveToday();

  const tabs = document.querySelectorAll('.period-tab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activePeriod = tab.dataset.period;
      renderDashboard(activePeriod);
    });
  });

  renderDashboard(activePeriod);
});
</script>
